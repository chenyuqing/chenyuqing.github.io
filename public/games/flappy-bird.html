<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#152a38">
  <title>飞鸟穿云 · 3D Flappy Bird</title>
  <style>
    :root { --ink:#14100c; --paper:#f5ead0; --gold:#d6ae53; --orange:#b94e2c; --jade:#3f8069; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100%; margin:0; }
    body { overflow:hidden; background:var(--ink); color:var(--paper); font-family:"KaiTi","STKaiti","Noto Serif SC",serif; }
    button { font:inherit; }
    .game-shell,.game-frame,.game-stage { width:100%; height:100%; }
    .game-shell { position:relative; min-height:100dvh; background:var(--ink); }
    .game-frame { position:relative; }
    .topbar { position:fixed; z-index:4; top:1.15rem; left:1.4rem; right:1.4rem; display:flex; align-items:center; justify-content:space-between; gap:.75rem; pointer-events:none; }
    .brand { margin:0; color:var(--paper); font-size:clamp(1.35rem, 2.4vw, 2rem); letter-spacing:.14em; line-height:.92; text-shadow:0 1px 12px rgba(20,16,12,.65); }
    .brand small { display:inline; margin-left:.65rem; color:#d6b96f; font:700 .58rem/1 ui-monospace,monospace; letter-spacing:.2em; }
    .home-link,.icon-button,.play-button,.control-button { border:1px solid rgba(245,234,208,.48); border-radius:3px; color:var(--paper); cursor:pointer; text-decoration:none; }
    .home-link { padding:.62rem .8rem; background:rgba(20,16,12,.8); font:700 .72rem/1.1 system-ui,sans-serif; letter-spacing:.08em; pointer-events:auto; }
    .home-link:hover,.icon-button:hover,.control-button:hover { border-color:var(--gold); color:var(--gold); }
    .game-stage { position:fixed; inset:0; overflow:hidden; background:#77b6c6; }
    #world { position:absolute; inset:0; touch-action:manipulation; cursor:pointer; }
    #world canvas { display:block; width:100%; height:100%; }
    .hud { position:fixed; z-index:3; top:4.6rem; right:1.4rem; display:flex; align-items:start; gap:.55rem; pointer-events:none; }
    .score-box { min-width:4.4rem; padding:.42rem .55rem; border:1px solid rgba(245,234,208,.48); border-radius:3px; background:rgba(20,16,12,.8); color:var(--paper); text-align:center; }
    .score-box span { display:block; color:#d2b777; font:700 .56rem/1 system-ui,sans-serif; letter-spacing:.13em; }
    .score-box strong { display:block; font:800 1.25rem/1.1 system-ui,sans-serif; }
    .icon-button { width:2.7rem; height:2.7rem; background:rgba(20,16,12,.8); font-size:1.1rem; pointer-events:auto; }
    .message { position:fixed; z-index:3; inset:0; display:grid; place-items:center; padding:1.3rem; background:rgba(20,16,12,.16); text-align:center; }
    .message[hidden] { display:none; }
    .message-card { width:min(100%, 23rem); padding:1.55rem; border:1px solid rgba(245,234,208,.7); border-radius:3px; background:rgba(20,16,12,.9); box-shadow:0 .8rem 2rem rgba(0,0,0,.3); }
    .message-card p { margin:0 0 .35rem; color:#d2b777; font:700 .66rem/1 system-ui,sans-serif; letter-spacing:.16em; }
    .message-card h2 { margin:0; color:var(--paper); font-size:2.3rem; letter-spacing:.1em; }
    .message-card .detail { margin:.75rem 0 1.1rem; color:#e7dcc4; font:400 .83rem/1.55 system-ui,sans-serif; }
    .play-button { padding:.75rem 1.25rem; border-color:#d87a4c; background:var(--orange); color:#fff8e8; font:700 .78rem/1 system-ui,sans-serif; letter-spacing:.09em; }
    .play-button:hover { background:#cd6238; }
    .controls { position:fixed; z-index:4; bottom:1.15rem; left:1.4rem; display:flex; gap:.55rem; align-items:center; pointer-events:none; }
    .hint { margin:0 1rem 0 0; color:rgba(245,234,208,.88); font:400 .7rem/1.35 system-ui,sans-serif; text-shadow:0 1px 8px rgba(20,16,12,.65); }
    .control-button { min-width:2.7rem; min-height:2.6rem; background:rgba(20,16,12,.8); font:1rem/1 system-ui,sans-serif; pointer-events:auto; }
    @media (max-width:720px) { .topbar { top:.75rem; left:.8rem; right:.8rem; } .brand small { display:none; } .hud { top:3.95rem; right:.8rem; } .controls { bottom:.75rem; left:.8rem; } .hint { display:none; } .message-card { width:min(100% - 2rem, 20rem); } }
  </style>
</head>
<body>
  <main class="game-shell">
    <section class="game-frame" aria-label="飞鸟穿云游戏">
      <header class="topbar"><h1 class="brand">飞鸟穿云<small>3D FLAPPY BIRD</small></h1><a class="home-link" href="/games/">返回游戏库</a></header>
      <div class="game-stage">
        <div id="world" aria-label="点击或按空格键让小鸟飞起"></div>
        <div class="hud" aria-live="polite"><div class="score-box"><span>分数</span><strong id="score">0</strong></div><button class="icon-button" id="pause" type="button" aria-label="暂停游戏" title="暂停游戏">Ⅱ</button><div class="score-box"><span>最高</span><strong id="best">0</strong></div></div>
        <div class="message" id="message"><div class="message-card"><p id="message-kicker">准备起飞</p><h2 id="message-title">穿过云层</h2><div class="detail" id="message-detail">点击画面、触碰屏幕或按空格键，让小鸟振翅。</div><button class="play-button" id="play" type="button">开始飞行</button></div></div>
      </div>
      <footer class="controls"><p class="hint">点击画面或按空格键飞行<br>穿过竹管，别碰到边缘。</p><button class="control-button" id="restart" type="button" aria-label="重新开始" title="重新开始">↻</button><button class="control-button" id="sound" type="button" aria-label="音效开关" title="音效开关">♪</button></footer>
    </section>
  </main>
  <script src="/games/lib/three.r147.min.js"></script>
  <script>
    const mount = document.querySelector('#world');
    const scoreNode = document.querySelector('#score');
    const bestNode = document.querySelector('#best');
    const message = document.querySelector('#message');
    const messageKicker = document.querySelector('#message-kicker');
    const messageTitle = document.querySelector('#message-title');
    const messageDetail = document.querySelector('#message-detail');
    const playButton = document.querySelector('#play');
    const pauseButton = document.querySelector('#pause');
    const restartButton = document.querySelector('#restart');
    const soundButton = document.querySelector('#sound');

    const WORLD_TOP = 6.9, WORLD_BOTTOM = -6.2, PIPE_WIDTH = 1.24, BIRD_X = -3.25, BIRD_RADIUS = .46;
    const bird = { y: .5, velocity:0, rotation:0 };
    let scene, camera, renderer, birdMesh, pipeGroup, cloudGroup;
    let pipes = [], state = 'ready', score = 0, spawnTimer = 0, lastFrame = 0;
    let best = Number(localStorage.getItem('flappy-bird-best') || 0);
    let muted = localStorage.getItem('flappy-bird-muted') === 'true';
    let audioContext;
    bestNode.textContent = best;
    soundButton.textContent = muted ? '♪̸' : '♪';

    const material = (color, roughness=.8) => new THREE.MeshStandardMaterial({ color, roughness, metalness:.04 });
    const jade = material(0x367a60), jadeLight = material(0x58a77b), jadeDark = material(0x1d4e42);
    const gold = material(0xf1bd48), cream = material(0xfff1ce), orange = material(0xda6632), ink = material(0x172c37);

    function tone(frequency, duration, type='sine') {
      if (muted) return;
      audioContext ??= new AudioContext();
      const oscillator = audioContext.createOscillator(), gain = audioContext.createGain();
      oscillator.type = type; oscillator.frequency.value = frequency;
      gain.gain.setValueAtTime(.035, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001, audioContext.currentTime + duration);
      oscillator.connect(gain).connect(audioContext.destination); oscillator.start(); oscillator.stop(audioContext.currentTime + duration);
    }

    function addMesh(geometry, mat, position, group=scene) {
      const mesh = new THREE.Mesh(geometry, mat); mesh.position.set(...position); mesh.castShadow = true; mesh.receiveShadow = true; group.add(mesh); return mesh;
    }

    function makeCloud(x, y, scale) {
      const cloud = new THREE.Group();
      [[0,0,.55],[.5,.1,.72],[1.12,-.06,.48],[1.48,.05,.34]].forEach(([dx,dy,r]) => {
        const puff = new THREE.Mesh(new THREE.SphereGeometry(r * scale, 12, 8), new THREE.MeshStandardMaterial({color:0xfff5d9, roughness:1, transparent:true, opacity:.68}));
        puff.position.set(x + dx * scale, y + dy * scale, -2.8 - r * .25); cloud.add(puff);
      });
      cloudGroup.add(cloud);
    }

    function makeBird() {
      const group = new THREE.Group();
      addMesh(new THREE.SphereGeometry(.52, 20, 14), gold, [0,0,0], group).scale.set(1.08,.84,.82);
      const belly = addMesh(new THREE.SphereGeometry(.32, 16, 10), cream, [-.08,-.15,.4], group); belly.scale.set(1,.55,.35);
      const wing = addMesh(new THREE.SphereGeometry(.35, 14, 10), orange, [-.23,-.02,.42], group); wing.scale.set(1.2,.34,.2);
      const beak = addMesh(new THREE.ConeGeometry(.22,.5,4), orange, [.57,.02,.02], group); beak.rotation.z = -Math.PI / 2;
      const eyeWhite = addMesh(new THREE.SphereGeometry(.13, 12, 8), cream, [.24,.22,.4], group);
      const pupil = addMesh(new THREE.SphereGeometry(.052, 10, 8), ink, [.27,.23,.51], group);
      group.position.set(BIRD_X, bird.y, .3); group.rotation.order = 'ZXY'; scene.add(group); return group;
    }

    function makePipe(top, gap) {
      const group = new THREE.Group();
      const upperEdge = top + gap / 2, lowerEdge = top - gap / 2;
      const cylinder = (height, y, capY, capRotation) => {
        addMesh(new THREE.CylinderGeometry(.54,.54,height,12), jade, [0,y,0], group);
        addMesh(new THREE.CylinderGeometry(.68,.68,.38,12), jadeLight, [0,capY,0], group);
        const collar = addMesh(new THREE.TorusGeometry(.55,.07,8,16), jadeDark, [0,capY + capRotation * .21,0], group); collar.rotation.x = Math.PI / 2;
      };
      cylinder(WORLD_TOP - upperEdge, (WORLD_TOP + upperEdge) / 2, upperEdge + .19, -1);
      cylinder(lowerEdge - WORLD_BOTTOM, (WORLD_BOTTOM + lowerEdge) / 2, lowerEdge - .19, 1);
      group.position.x = 10.5; pipeGroup.add(group);
      return { group, top, gap, passed:false };
    }

    function initScene() {
      scene = new THREE.Scene(); scene.fog = new THREE.Fog(0x8dc7c8, 15, 30);
      camera = new THREE.PerspectiveCamera(43, 7/11.5, .1, 60); camera.position.set(-.35,.35,18); camera.lookAt(-.2,.35,0);
      renderer = new THREE.WebGLRenderer({antialias:true, alpha:false}); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; renderer.outputEncoding = THREE.sRGBEncoding; renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.08; mount.appendChild(renderer.domElement);
      scene.add(new THREE.HemisphereLight(0xc4eff1,0x886525,.9));
      const key = new THREE.DirectionalLight(0xffedc5,1.2); key.position.set(-5,10,10); key.castShadow=true; key.shadow.mapSize.set(1024,1024); scene.add(key);
      const rim = new THREE.DirectionalLight(0x5aab9b,.48); rim.position.set(7,4,-6); scene.add(rim);
      const sky = new THREE.Mesh(new THREE.PlaneGeometry(34,26), new THREE.MeshBasicMaterial({color:0x8fcbd0})); sky.position.set(0,.3,-4.4); scene.add(sky);
      const floor = addMesh(new THREE.BoxGeometry(29,.7,5), material(0xc99b42), [0,WORLD_BOTTOM-.32,-.1]);
      const grass = addMesh(new THREE.BoxGeometry(29,.22,5), material(0xf1c960), [0,WORLD_BOTTOM+.07,-.1]);
      floor.receiveShadow = grass.receiveShadow = true;
      pipeGroup = new THREE.Group(); cloudGroup = new THREE.Group(); scene.add(pipeGroup,cloudGroup);
      makeCloud(-6,4.8,1.3); makeCloud(2.2,2.9,.85); makeCloud(-1.5,-1.1,.9); makeCloud(5.5,-3.7,.72);
      birdMesh = makeBird(); resize(); addEventListener('resize', resize);
    }

    function resize() { const {width,height} = mount.getBoundingClientRect(); camera.aspect = width / height; camera.updateProjectionMatrix(); renderer.setSize(width,height,false); }
    function reset() { bird.y=.5; bird.velocity=0; bird.rotation=0; pipes.forEach(pipe=>pipeGroup.remove(pipe.group)); pipes=[]; score=0; spawnTimer=0; scoreNode.textContent=score; }
    function setMessage(kicker,title,detail,action) { messageKicker.textContent=kicker; messageTitle.textContent=title; messageDetail.textContent=detail; playButton.textContent=action; message.hidden=false; }
    function start() { if(state==='gameover') reset(); state='playing'; message.hidden=true; flap(); }
    function flap() { if(state==='ready'||state==='gameover'){start();return} if(state!=='playing')return; bird.velocity=7.7; bird.rotation=.3; tone(580,.07,'triangle'); }
    function togglePause() { if(state==='ready'||state==='gameover')return; if(state==='playing'){state='paused';pauseButton.textContent='▶';pauseButton.setAttribute('aria-label','继续游戏');setMessage('暂停中','云层静止','准备好后继续这一次飞行。','继续飞行')}else{state='playing';pauseButton.textContent='Ⅱ';pauseButton.setAttribute('aria-label','暂停游戏');message.hidden=true} }
    function endGame() { state='gameover'; tone(105,.22,'sawtooth'); if(score>best){best=score;localStorage.setItem('flappy-bird-best',best);bestNode.textContent=best} setMessage(score?'本次得分 '+score:'再试一次','飞行结束',score>=best&&score?'新的最高分，继续保持。':'调整节奏，下一次穿得更远。','重新起飞'); }
    function update(dt) {
      if(state!=='playing')return;
      bird.velocity -= 18.5*dt; bird.y += bird.velocity*dt; bird.rotation = Math.max(-1.08,bird.rotation-2.6*dt);
      spawnTimer+=dt; if(spawnTimer>=1.48){spawnTimer=0; const gap=Math.max(3.25,4.05-score*.025); pipes.push(makePipe(-.2+Math.random()*2.3,gap));}
      const speed=Math.min(7.2,5+score*.055);
      pipes.forEach(pipe=>{pipe.group.position.x-=speed*dt;if(!pipe.passed&&pipe.group.position.x+PIPE_WIDTH/2<BIRD_X){pipe.passed=true;score++;scoreNode.textContent=score;tone(780,.09)}});
      pipes=pipes.filter(pipe=>{if(pipe.group.position.x<-11){pipeGroup.remove(pipe.group);return false}return true});
      if(bird.y+BIRD_RADIUS>WORLD_TOP||bird.y-BIRD_RADIUS<WORLD_BOTTOM||pipes.some(pipe=>Math.abs(pipe.group.position.x-BIRD_X)<PIPE_WIDTH/2+BIRD_RADIUS&&(bird.y+BIRD_RADIUS>pipe.top+pipe.gap/2||bird.y-BIRD_RADIUS<pipe.top-pipe.gap/2)))endGame();
    }
    function render(time) { const dt=Math.min(.035,(time-lastFrame)/1000||0);lastFrame=time;update(dt);birdMesh.position.y=bird.y;birdMesh.rotation.z=bird.rotation;cloudGroup.position.x=Math.sin(time*.00012)*.26;renderer.render(scene,camera);requestAnimationFrame(render); }

    mount.addEventListener('pointerdown',flap);
    playButton.addEventListener('click',()=>state==='paused'?togglePause():start());
    pauseButton.addEventListener('click',togglePause);
    restartButton.addEventListener('click',()=>{reset();state='ready';setMessage('准备起飞','穿过云层','点击画面、触碰屏幕或按空格键，让小鸟振翅。','开始飞行')});
    soundButton.addEventListener('click',()=>{muted=!muted;localStorage.setItem('flappy-bird-muted',muted);soundButton.textContent=muted?'♪̸':'♪'});
    addEventListener('keydown',event=>{if(event.code==='Space'||event.code==='ArrowUp'){event.preventDefault();flap()}if(event.code==='KeyP')togglePause()});
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&state==='playing')togglePause()});
    initScene(); requestAnimationFrame(render);
  </script>
  <script src="/games/lib/game-i18n.js"></script>
</body>
</html>
