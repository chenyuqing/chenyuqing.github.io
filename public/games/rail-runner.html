<body>
<div id="world" aria-label="暮轨疾行游戏"></div>
<header id="topbar"><div class="brand">暮轨疾行<small>3D 三轨跑酷</small></div><div class="hud"><div class="chip"><span>关卡</span><b id="stage">1/3</b></div><div class="chip"><span>生命</span><b id="lives">♥♥♥♥♥</b></div><div class="chip"><span>分数</span><b id="score">0</b></div><div class="chip"><span>金币</span><b id="coins">0</b></div><div class="chip distance"><span>距离</span><b id="distance">0m</b></div><button class="chip icon" id="pause" title="暂停">Ⅱ</button><button class="chip icon" id="sound" title="切换音效">♪</button><a class="chip exit-game" href="/games/">退出</a></div></header>

<section class="overlay" id="intro"><div class="card"><p class="eyebrow">暮色铁道 · 无尽疾行</p><h1>暮轨疾行</h1><p class="sub">DUSK RAIL RUSH</p><div class="controls"><div class="control"><b>← →</b><span>换轨</span></div><div class="control"><b>↑</b><span>跳跃</span></div><div class="control"><b>↓</b><span>滑行</span></div></div><p class="difficulty-title">选择难度</p><div class="difficulties" id="difficulties"><button class="difficulty active" data-level="easy">简单<small>慢速 · 宽间距</small></button><button class="difficulty" data-level="normal">中等<small>标准节奏</small></button><button class="difficulty" data-level="hard">困难<small>高速 · 密集</small></button></div><p class="rules">方向键 / WASD 控制，空格跳跃；手机在画面上滑动。<br>列车需换轨，路障要跳过，信号架要滑行穿过。</p><button class="primary" id="start">开始疾行</button><a class="exit" href="/games/">退 出</a></div></section>
<section class="overlay" id="pause-screen" hidden><div class="card"><p class="eyebrow">暂停中</p><h1>铁道暂时安静了</h1><button class="primary" id="resume">继续疾行</button><button class="exit" id="restart-pause">重新开始本局</button><a class="exit" href="/games/">退 出</a></div></section>

<script>

  rain:{sky:0x4d5f6f,fog:0x3d4c58,ground:0x172027,bed:0x283640,rail:0xaec3cc,lamp:0xa8d9ef,city:0x26313a,accent:0x5c9fc0,kind:'rain'},
  bridge:{sky:0x6f9faf,fog:0x527c8a,ground:0x17333a,bed:0x2d5058,rail:0xd0d7c9,lamp:0xffd46c,city:0x315d67,accent:0xe8b450,kind:'bridge'},

let scene,camera,renderer,clock,player,trackGroup,hemi,sun;let running=false,paused=false,dead=false,difficulty='easy',stageIndex=0,lives=5,lane=1,targetX=0,vy=0,jumpY=0,slideT=0,runT=0,speed=13,distance=0,totalDistance=0,score=0,coinCount=0,nextSpawn=-42,audioCtx=null,muted=false;
const obstacles=[],coins=[];const world=document.getElementById('world');
const mat=(color,rough=.75,metal=.05,emissive=0)=>new THREE.MeshStandardMaterial({color,roughness:rough,metalness:metal,emissive,emissiveIntensity:emissive?0.35:0});
function mesh(geo,material,parent=scene){const m=new THREE.Mesh(geo,material);m.castShadow=m.receiveShadow=true;parent.add(m);return m}
function init(){scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(62,innerWidth/innerHeight,.1,240);camera.position.set(0,8.2,13.8);camera.lookAt(0,1.5,-23);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,1.7));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.05;world.append(renderer.domElement);clock=new THREE.Clock();
hemi=new THREE.HemisphereLight(0xffc98a,0x211820,1.35);sun=new THREE.DirectionalLight(0xffc068,2);sun.position.set(-12,20,10);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);sun.shadow.camera.left=-18;sun.shadow.camera.right=18;sun.shadow.camera.top=24;sun.shadow.camera.bottom=-12;scene.add(hemi,sun);buildWorld();player=buildPlayer();scene.add(player);addEventListener('resize',resize);animate()}
function disposeGroup(group){group.traverse(o=>{o.geometry?.dispose();if(Array.isArray(o.material))o.material.forEach(m=>m.dispose());else o.material?.dispose()});scene.remove(group)}
function buildLandmark(theme){const dark=mat(theme.city,.85),accent=mat(theme.accent,.5,.25,theme.accent),glow=mat(theme.lamp,.35,.15,theme.lamp);if(theme.kind==='oldTown'||theme.kind==='terminal'){for(const z of [-45,-85,-125]){const arch=mesh(new THREE.TorusGeometry(4,.22,8,20,Math.PI),dark,trackGroup);arch.rotation.z=Math.PI;arch.position.set(0,5,z)}}else if(theme.kind==='viaduct'){for(let z=-18;z>-170;z-=18){for(const x of [-6.7,6.7]){const p=mesh(new THREE.CylinderGeometry(.38,.52,12,8),dark,trackGroup);p.position.set(x,5.8,z)}}}else if(theme.kind==='rain'){for(let i=0;i<90;i++){const drop=mesh(new THREE.BoxGeometry(.025,1.4+Math.random()*1.8,.025),new THREE.MeshBasicMaterial({color:theme.lamp,transparent:true,opacity:.3}),trackGroup);drop.position.set((Math.random()-.5)*25,2+Math.random()*10,-Math.random()*160)}}else if(theme.kind==='bridge'){for(const z of [-35,-100,-155]){for(const x of [-8,8]){const p=mesh(new THREE.CylinderGeometry(.25,.35,16,10),dark,trackGroup);p.position.set(x,8,z);const cable=mesh(new THREE.CylinderGeometry(.035,.035,12,6),accent,trackGroup);cable.position.set(x*.52,6,z);cable.rotation.z=x>0?.55:-.55}}}else if(theme.kind==='harbor'){for(let z=-40;z>-160;z-=38){const crane=mesh(new THREE.BoxGeometry(.35,11,.35),dark,trackGroup);crane.position.set(-10,5.5,z);const arm=mesh(new THREE.BoxGeometry(7,.25,.25),accent,trackGroup);arm.position.set(-6.8,10.5,z)}}else if(theme.kind==='neon'){for(let z=-28;z>-170;z-=24){const frame=mesh(new THREE.TorusGeometry(3.5,.12,8,4),glow,trackGroup);frame.position.set(0,4,z);frame.rotation.y=Math.PI/4}}else if(theme.kind==='mountain'){for(let i=0;i<12;i++){const peak=mesh(new THREE.ConeGeometry(5+Math.random()*6,8+Math.random()*9,6),dark,trackGroup);peak.position.set(-25+i*5,4,-45-i*13)}}else if(theme.kind==='cloud'){for(let i=0;i<18;i++){const cloud=mesh(new THREE.SphereGeometry(2+Math.random()*2,12,8),new THREE.MeshStandardMaterial({color:0xe1eef0,roughness:1,transparent:true,opacity:.78}),trackGroup);cloud.scale.set(1.8,.55,1);cloud.position.set((Math.random()-.5)*30,5+Math.random()*8,-25-i*10)}}else if(theme.kind==='ember'){for(let i=0;i<16;i++){const tower=mesh(new THREE.ConeGeometry(1.1,7+Math.random()*9,6),dark,trackGroup);tower.position.set((i%2?1:-1)*(8+Math.random()*8),4,-20-i*10);const fire=mesh(new THREE.SphereGeometry(.25,8,6),glow,trackGroup);fire.position.set(tower.position.x,tower.position.y+4,tower.position.z)}}}

function buildPlayer(){
  const g=new THREE.Group(),skin=mat(0x9da6ad,.92),skinLight=mat(0xc4c9ca,.9),red=mat(0xb83b2f,.72),white=mat(0xf4ead5,.9),dark=mat(0x2a2425,.8),tusk=mat(0xffedc8,.65),black=new THREE.MeshBasicMaterial({color:0x171313});

  const legs=[],arms=[];
  for(const x of [-.28,.28]){const pivot=new THREE.Group();pivot.position.set(x,1.04,0);g.add(pivot);const leg=mesh(new THREE.CylinderGeometry(.14,.17,.7,10),skin,pivot);leg.position.y=-.31;const foot=mesh(new THREE.SphereGeometry(.2,12,8),skinLight,pivot);foot.scale.set(1,.65,1.4);foot.position.set(0,-.68,.1);legs.push(pivot)}
  for(const x of [-.62,.62]){const pivot=new THREE.Group();pivot.position.set(x,1.72,0);pivot.rotation.z=x>0?-.18:.18;g.add(pivot);const arm=mesh(new THREE.CylinderGeometry(.11,.14,.68,10),skin,pivot);arm.position.y=-.3;const hand=mesh(new THREE.SphereGeometry(.15,10,8),skinLight,pivot);hand.position.y=-.65;arms.push(pivot)}
  g.userData={shadow,body,head,cape,trunk,prop,legs,arms};g.position.set(0,0,PLAYER_Z);return g
}
function boxObstacle(type,laneIndex,z){const g=new THREE.Group();let w=2.3,h,d=.85,y;if(type==='train'){h=3.65;d=6.5;y=h/2;const body=mesh(new THREE.BoxGeometry(w,h,d),mat(0x7c302b,.55,.35),g);body.position.y=y;const nose=mesh(new THREE.BoxGeometry(w*.82,.9,.12),mat(0x2d3038,.25,.5),g);nose.position.set(0,2.5,d/2+.07);for(const x of [-.55,.55]){const light=mesh(new THREE.SphereGeometry(.14,8,6),mat(0xf5d179,.3,.1,0xf5d179),g);light.position.set(x,1.45,d/2+.1)}}else if(type==='barrier'){h=1.05;y=.53;const b=mesh(new THREE.BoxGeometry(w,h,d),mat(0xd5a440),g);b.position.y=y;for(const x of [-.65,0,.65]){const stripe=mesh(new THREE.BoxGeometry(.26,h+.02,d+.03),mat(0x6e2926),g);stripe.position.set(x,y,0)}}else{h=2.8;y=2.35;for(const x of [-1,1]){const post=mesh(new THREE.BoxGeometry(.18,3.35,.25),mat(0x4a3530),g);post.position.set(x,1.68,0)}const beam=mesh(new THREE.BoxGeometry(2.3,.55,.5),mat(0xd5a440),g);beam.position.y=2.25}g.position.set(LANES[laneIndex],0,z);scene.add(g);obstacles.push({mesh:g,type,lane:laneIndex,z,passed:false});return g}
function addCoin(laneIndex,z,y=.95){const g=new THREE.Group(),m=mat(0xffcf47,.2,.65,0x9b5d0e);mesh(new THREE.TorusGeometry(.28,.09,8,16),m,g);const core=mesh(new THREE.CircleGeometry(.20,16),m,g);core.rotation.y=Math.PI;g.position.set(LANES[laneIndex],y,z);scene.add(g);coins.push({mesh:g,lane:laneIndex,z,taken:false})}
function generateChunk(z){const cfg=DIFFICULTIES[difficulty],safe=Math.floor(Math.random()*3),warmup=distance<65,makeDouble=!warmup&&Math.random()<cfg.doubleChance;if(makeDouble){const blocked=[0,1,2].filter(v=>v!==safe);boxObstacle(Math.random()<.5?'barrier':'signal',blocked[0],z);boxObstacle(Math.random()<cfg.trainChance?'train':'signal',blocked[1],z);for(let i=0;i<6;i++)addCoin(safe,z-i*1.45,.95)}else{const blocked=(safe+1+Math.floor(Math.random()*2))%3,type=warmup?(Math.random()<.55?'barrier':'signal'):(Math.random()<cfg.trainChance?'train':Math.random()<.55?'barrier':'signal');boxObstacle(type,blocked,z);if(type==='barrier'&&Math.random()<.5){for(let i=0;i<7;i++){const t=i/6;addCoin(blocked,z-i*1.35,.9+Math.sin(t*Math.PI)*1.9)}}else for(let i=0;i<6;i++)addCoin(safe,z-i*1.45,.95)}}
function removeObject(item){scene.remove(item.mesh);item.mesh.traverse(o=>{o.geometry?.dispose();if(Array.isArray(o.material))o.material.forEach(m=>m.dispose());else o.material?.dispose()})}
function clearObjects(){for(const item of [...obstacles,...coins])removeObject(item);obstacles.length=coins.length=0}
function reset(fullRun=true){const cfg=DIFFICULTIES[difficulty];if(fullRun){stageIndex=0;lives=5;totalDistance=score=coinCount=0;buildWorld()}clearObjects();lane=1;targetX=0;vy=jumpY=slideT=runT=distance=0;speed=cfg.start;nextSpawn=-cfg.first;dead=false;player.position.set(0,0,PLAYER_Z);player.rotation.set(0,0,0);player.scale.set(1,1,1);player.userData.shadow.position.set(0,.025,PLAYER_Z);player.userData.shadow.material.opacity=.38;for(let z=-cfg.first;z>-155;z-=cfg.gapMin+cfg.gapRange*.5)generateChunk(z);sync()}
function start(){ensureAudio();reset(true);document.getElementById('intro').hidden=true;document.getElementById('game-over').hidden=true;document.getElementById('pause-screen').hidden=true;document.getElementById('stage-clear').hidden=true;running=true;paused=false;clock.getDelta();tone(440,.08);setTimeout(()=>tone(660,.12),90)}
function moveLane(dir){if(!running||paused)return;lane=Math.max(0,Math.min(2,lane+dir));targetX=LANES[lane];tone(250+lane*70,.05,.08)}
function jump(){if(!running||paused||jumpY>.04)return;vy=9.4;slideT=0;tone(480,.12,.12,780)}
function slide(){if(!running||paused||jumpY>.15)return;slideT=.72;tone(180,.1,.08,100)}
function hit(){if(dead)return;dead=true;running=false;lives-=1;tone(150,.42,.2,45);player.rotation.z=-.65;sync();setTimeout(()=>{if(lives>0){reset(false);running=true;toast(`撞击！剩余 ${lives} 条命`);tone(330,.12,.1)}else{const best=Math.max(score,Number(localStorage.getItem('rail-runner-best')||0));localStorage.setItem('rail-runner-best',best);document.getElementById('result').textContent=`没命了，从头开始　·　分数 ${score}　·　金币 ${coinCount}　·　最高 ${best}`;document.getElementById('game-over').hidden=false}},700)}
function completeStage(){running=false;const final=stageIndex===STAGES.length-1,title=document.getElementById('stage-clear-title'),button=document.getElementById('next-stage');title.textContent=final?'全线通关':`第 ${stageIndex+1} 关完成`;document.getElementById('stage-clear-result').textContent=`分数 ${score}　·　金币 ${coinCount}　·　本关 ${STAGES[stageIndex].goal} 米`;button.textContent=final?'再来一局':'进入下一关';button.dataset.final=final?'true':'false';document.getElementById('stage-clear').hidden=false;[523,659,784,1047].forEach((freq,i)=>setTimeout(()=>tone(freq,.16,.11),i*100))}
function update(dt){const cfg=DIFFICULTIES[difficulty];speed=Math.min(cfg.max,cfg.start+(distance+stageIndex*55)/cfg.accel);const step=speed*dt*.34;distance+=step;totalDistance+=step;score=Math.floor(totalDistance*10)+coinCount*50;if(distance>=STAGES[stageIndex].goal){distance=STAGES[stageIndex].goal;sync();completeStage();return}runT+=dt*10;targetX=LANES[lane];const laneDelta=targetX-player.position.x;player.position.x+=laneDelta*Math.min(1,dt*(difficulty==='easy'?17:14));vy-=25*dt;jumpY=Math.max(0,jumpY+vy*dt);if(jumpY===0&&vy<0)vy=0;slideT=Math.max(0,slideT-dt);player.position.y=jumpY;player.scale.y+=((slideT>0?.5:1)-player.scale.y)*Math.min(1,dt*18);
const parts=player.userData,air=jumpY>.1? .28:1,stride=Math.sin(runT);parts.legs.forEach((limb,i)=>limb.rotation.x=Math.sin(runT+i*Math.PI)*.7*air);parts.arms.forEach((limb,i)=>limb.rotation.x=Math.sin(runT+(i+1)*Math.PI)*.65*air);parts.body.position.y=1.42+Math.abs(stride)*.045;parts.head.position.y=2.28+Math.abs(stride)*.025;parts.trunk.rotation.z=Math.sin(runT*.5)*.055;parts.prop.rotation.y+=dt*(running?18:3);parts.cape.rotation.x=-.14-Math.abs(stride)*.1-speed*.006;player.rotation.z+=(Math.max(-.22,Math.min(.22,-laneDelta*.08))-player.rotation.z)*Math.min(1,dt*12);parts.shadow.position.x=player.position.x;parts.shadow.scale.set(1-jumpY*.08,.45-jumpY*.025,1);parts.shadow.material.opacity=Math.max(.1,.38-jumpY*.1);
for(let z=-178;z<24;z+=2){}const dz=speed*dt;for(const o of obstacles){o.z+=dz;o.mesh.position.z=o.z;if(!o.passed&&o.z>PLAYER_Z-1.1){o.passed=true;if(o.lane===lane&&o.z<PLAYER_Z+1.3){const safe=o.type==='barrier'?jumpY>1.05:o.type==='signal'?slideT>.12:false;if(!safe)hit()}}}for(const c of coins){c.z+=dz;c.mesh.position.z=c.z;c.mesh.rotation.y+=dt*6;if(!c.taken&&c.lane===lane&&Math.abs(c.z-PLAYER_Z)<.8&&Math.abs((jumpY+1)-c.mesh.position.y)<1.25){c.taken=true;c.mesh.visible=false;coinCount++;tone(880,.06,.08,1320)}}
for(let i=obstacles.length-1;i>=0;i--)if(obstacles[i].z>RECYCLE_Z){removeObject(obstacles[i]);obstacles.splice(i,1)}for(let i=coins.length-1;i>=0;i--)if(coins[i].z>RECYCLE_Z){removeObject(coins[i]);coins.splice(i,1)}nextSpawn+=dz;if(nextSpawn>-118){nextSpawn-=cfg.gapMin+Math.random()*cfg.gapRange;generateChunk(nextSpawn)}sync()}
function sync(){const current=STAGES[stageIndex];document.getElementById('stage').textContent=`${stageIndex+1}/${STAGES.length}`;document.getElementById('lives').textContent=`${'♥'.repeat(Math.max(0,lives))}${'·'.repeat(5-lives)}`;document.getElementById('score').textContent=score;document.getElementById('coins').textContent=coinCount;document.getElementById('distance').textContent=`${Math.floor(totalDistance)}m`;document.getElementById('speed-value').textContent=`${(speed/DIFFICULTIES[difficulty].start).toFixed(1)}×`;document.getElementById('route-name').textContent=current.name;document.getElementById('route-distance').textContent=`${Math.floor(distance)} / ${current.goal}m`;document.getElementById('progress-fill').style.width=`${Math.min(100,distance/current.goal*100)}%`}
function togglePause(force){if(dead||document.getElementById('intro').hidden===false||document.getElementById('stage-clear').hidden===false)return;paused=force??!paused;running=!paused;document.getElementById('pause-screen').hidden=!paused;clock.getDelta()}
function ensureAudio(){if(!audioCtx){const AC=window.AudioContext||window.webkitAudioContext;if(AC)audioCtx=new AC()}audioCtx?.resume()}
function tone(freq,dur=.08,gain=.1,to=null){if(muted||!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=audioCtx.currentTime;o.type='square';o.frequency.setValueAtTime(freq,t);if(to)o.frequency.exponentialRampToValueAtTime(to,t+dur);g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur)}
function control(key){if(key==='left')moveLane(-1);else if(key==='right')moveLane(1);else if(key==='up')jump();else if(key==='down')slide()}
addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(['arrowleft','arrowright','arrowup','arrowdown',' ','a','d','w','s'].includes(k))e.preventDefault();if(k==='p'||k==='escape')togglePause();else control(k==='a'?'left':k==='d'?'right':k==='w'||k===' '?'up':k==='s'?'down':k.replace('arrow',''))});let sx=0,sy=0;world.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY});world.addEventListener('pointerup',e=>{const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;if(Math.abs(dx)>Math.abs(dy))control(dx>0?'right':'left');else control(dy>0?'down':'up')});
document.getElementById('start').onclick=start;document.getElementById('again').onclick=start;document.getElementById('pause').onclick=()=>togglePause();document.getElementById('resume').onclick=()=>togglePause(false);document.getElementById('restart-pause').onclick=start;document.getElementById('next-stage').onclick=e=>{if(e.currentTarget.dataset.final==='true'){start();return}stageIndex++;buildWorld();reset(false);document.getElementById('stage-clear').hidden=true;running=true;paused=false;clock.getDelta();tone(520,.1,.1)};document.getElementById('sound').onclick=()=>{muted=!muted;document.getElementById('sound').textContent=muted?'×':'♪'};document.getElementById('difficulties').addEventListener('click',e=>{const button=e.target.closest('.difficulty');if(!button)return;difficulty=button.dataset.level;document.querySelectorAll('.difficulty').forEach(el=>el.classList.toggle('active',el===button))});
function resize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)}function animate(){requestAnimationFrame(animate);const dt=Math.min(.033,clock.getDelta());if(running&&!paused&&!dead)update(dt);camera.position.x+=(player.position.x*.16-camera.position.x)*.05;camera.lookAt(player.position.x*.1,1.45,-23);renderer.render(scene,camera)}init();
})();
</script>
