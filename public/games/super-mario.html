<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12100b">
<title>蘑菇奇兵 · 3D 跑酷冒险</title>
<style>
  :root{
    --gold:#D4A017; --gold-light:#F0C75E; --zhu:#C0392B; --zhu-dark:#8E2A20;
    --p1:#d2483a; --panel-bg:rgba(24,20,12,.9); --paper:#f5e6c8;
    --sky:#b8d9f0; --ground:#5a8e3c;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
  html,body{width:100%;height:100%;overflow:hidden;background:#12100b;font-family:"KaiTi","STKaiti","楷体",serif;}
  #canvas-wrap{position:fixed;inset:0;touch-action:none;}
  canvas{display:block;touch-action:none;}

  #topbar{
    position:fixed;top:0;left:0;right:0;height:64px;z-index:20;pointer-events:none;
    display:flex;align-items:center;justify-content:space-between;padding:0 22px;
    padding-top:env(safe-area-inset-top);
    background:linear-gradient(180deg,rgba(10,8,5,.85),rgba(10,8,5,0));
  }
  #game-title{
    font-size:28px;font-weight:bold;letter-spacing:5px;color:var(--gold-light);
    text-shadow:0 0 18px rgba(212,160,23,.55),0 2px 4px #000;pointer-events:auto;
  }
  #game-title small{font-size:13px;letter-spacing:2px;color:#cbb37a;margin-left:9px;}
  #home-link{display:inline-flex;align-items:center;margin-left:16px;padding:9px 14px;border:2px solid #f5da84;border-radius:6px;background:#d4a017;color:#1a1208;font-family:system-ui,sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;text-decoration:none;text-shadow:none;vertical-align:middle;box-shadow:0 3px 12px rgba(0,0,0,.48);pointer-events:auto;}
  #home-link:hover{background:#f5da84;}
  #scoreboard{pointer-events:auto;display:flex;gap:10px;align-items:center;}
  .score-chip{font-size:15px;letter-spacing:1px;padding:6px 14px;border-radius:24px;border:2px solid var(--gold);color:#fff;background:linear-gradient(135deg,rgba(60,44,26,.9),rgba(30,22,12,.9));box-shadow:0 0 12px rgba(0,0,0,.5);}
  .score-chip b{color:var(--gold-light);font-weight:bold;}
  .audio-chip{cursor:pointer;font-size:16px;line-height:1;padding:6px 10px;opacity:.85;transition:all .15s;}
  .audio-chip:hover{opacity:1;box-shadow:0 0 14px rgba(212,160,23,.55);}
  .audio-chip.off{opacity:.4;text-decoration:line-through;}

  #toast{
    position:fixed;top:82px;left:50%;transform:translateX(-50%) scale(.8);z-index:30;
    font-size:30px;font-weight:bold;letter-spacing:6px;color:var(--gold-light);
    text-shadow:0 0 24px rgba(212,160,23,.8),0 3px 6px #000;opacity:0;transition:all .35s;pointer-events:none;
    white-space:nowrap;max-width:calc(100vw - 32px);text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) scale(1);}
  #toast.danger{color:#ff6b5e;text-shadow:0 0 24px rgba(255,60,40,.9),0 3px 6px #000;}

  #panel{
    position:fixed;top:76px;right:14px;width:230px;z-index:25;
    background:var(--panel-bg);border:2px solid rgba(212,160,23,.5);border-radius:14px;
    backdrop-filter:blur(6px);padding:14px;transition:transform .4s;box-shadow:0 10px 30px rgba(0,0,0,.55);
    padding-right:calc(14px + env(safe-area-inset-right));
  }
  #panel.collapsed{transform:translateX(calc(100% + 20px));}
  .sec-title{font-size:14px;color:var(--gold);letter-spacing:3px;margin:0 0 8px;border-bottom:1px solid rgba(212,160,23,.35);padding-bottom:4px;}
  .row{display:flex;justify-content:space-between;align-items:center;margin:7px 0;font-size:14px;color:#e8d5ae;}
  .row .val{color:var(--gold-light);font-weight:bold;}
  .btn-row{display:flex;gap:8px;margin-top:12px;}
  .gbtn{
    flex:1;font-family:inherit;font-size:15px;letter-spacing:1px;cursor:pointer;
    padding:9px 6px;border-radius:9px;border:1.5px solid rgba(212,160,23,.55);
    background:rgba(60,44,26,.55);color:#e8d5ae;transition:all .18s;text-align:center;
  }
  .gbtn:hover{border-color:var(--gold-light);color:#fff;box-shadow:0 0 10px rgba(212,160,23,.4);}
  #panel-toggle{
    position:fixed;top:84px;right:14px;z-index:26;width:40px;height:40px;border-radius:50%;
    border:2px solid var(--gold);background:var(--panel-bg);color:var(--gold-light);
    font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:right .4s;box-shadow:0 4px 12px rgba(0,0,0,.5);
  }
  #panel:not(.collapsed)~#panel-toggle{right:258px;}

  #win-banner{
    position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:40;text-align:center;
    transition:transform .5s cubic-bezier(.2,1.6,.4,1);pointer-events:none;
  }
  #win-banner.show{transform:translate(-50%,-50%) scale(1);pointer-events:auto;}
  #win-text{font-size:60px;font-weight:bold;letter-spacing:12px;color:var(--gold-light);text-shadow:0 0 40px rgba(212,160,23,.9),0 0 80px rgba(192,57,43,.6),0 4px 8px #000;}
  #win-sub{font-size:20px;color:#e8d5ae;margin-top:12px;letter-spacing:3px;}
  #win-again{margin-top:24px;font-family:inherit;font-size:20px;letter-spacing:5px;cursor:pointer;padding:12px 40px;border-radius:40px;border:2px solid var(--gold);color:#1a1208;background:linear-gradient(180deg,var(--gold-light),var(--gold));box-shadow:0 6px 20px rgba(0,0,0,.6);}
  #win-quit{display:inline-block;margin-top:14px;font-family:inherit;font-size:14px;letter-spacing:2px;color:#e8d5ae;text-decoration:none;padding:8px 20px;border:1.5px solid rgba(212,160,23,.6);border-radius:22px;background:rgba(20,15,8,.5);transition:all .16s;}
  #win-quit:hover{color:#fff;border-color:var(--gold-light);background:rgba(60,44,26,.7);}

  #intro{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(20,14,8,.55),rgba(8,6,4,.94));transition:opacity .6s;}
  #intro.hide{opacity:0;pointer-events:none;}
  #intro-card{width:min(560px,92vw);max-height:92vh;overflow-y:auto;text-align:center;padding:36px 40px 30px;background:linear-gradient(160deg,#f7ead0,#ecd9b4);border-radius:16px;border:3px solid var(--gold);box-shadow:0 0 0 6px rgba(142,42,32,.35),0 30px 80px rgba(0,0,0,.8);position:relative;}
  #intro-card::before,#intro-card::after{content:"";position:absolute;left:14px;right:14px;height:8px;background:repeating-linear-gradient(90deg,var(--zhu) 0 14px,var(--gold) 14px 28px);border-radius:4px;}
  #intro-card::before{top:8px;} #intro-card::after{bottom:8px;}
  #intro-title{font-size:48px;letter-spacing:10px;color:var(--zhu-dark);text-shadow:0 2px 0 #fff3dd;margin:8px 0 2px;}
  #intro-sub{font-size:16px;color:#7a5c2e;letter-spacing:3px;margin-bottom:20px;}
  .intro-label{font-size:18px;color:#5c4320;letter-spacing:2px;margin-bottom:10px;font-weight:bold;}
  .intro-opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:6px;}
  .intro-opt{font-family:inherit;font-size:18px;letter-spacing:1px;cursor:pointer;padding:11px 22px;border-radius:11px;border:2px solid #b48a3e;background:#fff8e8;color:#5c4320;transition:all .16s;}
  .intro-opt:hover{border-color:var(--zhu);transform:translateY(-2px);}
  .intro-opt.active{background:var(--zhu);color:#ffe9c9;border-color:var(--zhu-dark);box-shadow:0 6px 16px rgba(142,42,32,.4);}
  #intro-stage .intro-opt{padding:9px 16px;font-size:16px;}
  #intro-start{margin-top:22px;font-family:inherit;font-size:26px;font-weight:bold;letter-spacing:9px;cursor:pointer;padding:14px 60px;border-radius:44px;border:none;color:#fff6df;background:linear-gradient(180deg,#d2483a,#8E2A20);box-shadow:0 8px 24px rgba(142,42,32,.55),inset 0 2px 0 rgba(255,255,255,.25);transition:all .18s;}
  #intro-start:hover{transform:scale(1.05);}
  #intro-quit{display:inline-block;margin-top:14px;font-family:inherit;font-size:26px;font-weight:bold;letter-spacing:9px;cursor:pointer;padding:14px 60px;border-radius:44px;border:none;color:#fff6df;background:linear-gradient(180deg,#d2483a,#8E2A20);box-shadow:0 8px 24px rgba(142,42,32,.55),inset 0 2px 0 rgba(255,255,255,.25);transition:all .18s;text-decoration:none;}
  #intro-quit:hover{transform:scale(1.05);color:#fff6df;}
  #intro-tip{margin-top:14px;font-size:13.5px;color:#8a6d42;line-height:1.7;}
  #intro-tip b{color:#5c4320;}

  /* 触摸控制 */
  #mobile-controls{display:none;position:fixed;inset:auto 0 max(14px,env(safe-area-inset-bottom));z-index:30;justify-content:space-between;padding:0 18px;pointer-events:none;}
  .pad,.firebtn,.jumpbtn{pointer-events:auto;}
  .pad{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(2,44px);gap:4px;}
  .pad button,.firebtn,.jumpbtn{border:2px solid rgba(240,220,150,.7);background:rgba(24,20,12,.9);color:var(--gold-light);font:22px/1 sans-serif;border-radius:10px;cursor:pointer;}
  .pad button:active,.firebtn:active,.jumpbtn:active{background:var(--gold);color:#1a1208;}
  .up{grid-column:2;} .left{grid-row:2;} .down{grid-column:2;grid-row:2;} .right{grid-column:3;grid-row:2;}
  .jumpbtn{width:88px;height:88px;border-radius:50%;font:14px/1 inherit;letter-spacing:2px;color:#f2d97a;align-self:end;}
  .firebtn{width:64px;height:64px;border-radius:50%;font:13px/1 inherit;letter-spacing:1px;color:#ff8870;align-self:end;margin-right:10px;}

  /* 移动端适配 */
  @media(max-width:820px){
    #game-title{font-size:18px;letter-spacing:2px;}
    #game-title small{display:none;}
    #home-link{margin-left:8px;padding:7px 9px;font-size:12px;}
    #topbar{height:52px;padding:0 12px;}
    #scoreboard{gap:6px;}
    .score-chip{font-size:12px;padding:4px 9px;}
    .audio-chip{font-size:14px;padding:4px 8px;}
    #panel{top:58px;width:min(78vw,220px);}
    #panel-toggle{top:64px;}
    #intro-title{font-size:32px;letter-spacing:6px;}
    #intro-sub{font-size:13px;letter-spacing:2px;margin-bottom:14px;}
    .intro-label{font-size:15px;margin-bottom:7px;}
    .intro-opt{font-size:15px;padding:9px 16px;letter-spacing:0;}
    #intro-stage .intro-opt{padding:9px 14px;font-size:14px;}
    #intro-card{padding:26px 18px 22px;max-width:94vw;max-height:94vh;}
    #intro-start{font-size:21px;padding:12px 44px;letter-spacing:7px;margin-top:18px;}
    #intro-quit{font-size:16px;padding:10px 36px;letter-spacing:5px;margin-top:10px;}
    #intro-tip{font-size:12px;margin-top:12px;line-height:1.6;}
    #win-text{font-size:40px;letter-spacing:8px;}
    #win-sub{font-size:16px;letter-spacing:1px;margin-top:10px;}
    #win-again{font-size:17px;padding:11px 36px;letter-spacing:4px;margin-top:20px;}
    #toast{font-size:22px;letter-spacing:4px;top:74px;}
    #mobile-controls{display:flex;}
    #panel{display:none;}
  }
  @media(max-width:480px){
    #intro-stage{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    #intro-mode{flex-wrap:nowrap;}
    #intro-title{font-size:28px;letter-spacing:4px;}
    #intro-tip{font-size:11.5px;margin-top:10px;}
  }
  @media(max-width:820px) and (orientation:landscape){
    .tip-mobile{display:inline !important;}
    #intro-card{padding:18px 18px 16px;}
    #intro-title{font-size:26px;letter-spacing:4px;margin:4px 0 0;}
    #intro-sub{margin-bottom:10px;}
    .intro-label{margin-bottom:5px;font-size:14px;}
    .intro-opt{font-size:14px;padding:7px 14px;}
    #intro-stage .intro-opt{padding:7px 12px;font-size:13px;}
    #intro-start{font-size:18px;padding:10px 40px;letter-spacing:5px;margin-top:14px;}
    #intro-quit{font-size:14px;padding:8px 28px;letter-spacing:4px;margin-top:8px;}
    #intro-tip{font-size:11px;margin-top:8px;line-height:1.5;}
  }
  @media(max-width:820px) and (orientation:portrait){
    .tip-mobile{display:inline !important;}
  }
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="topbar">
  <div id="game-title">蘑菇奇兵<small>3D 跑酷冒险</small><a id="home-link" href="/games/">返回游戏专区</a></div>
  <div id="scoreboard">
    <div class="score-chip">金币 <b id="hud-coin">0</b></div>
    <div class="score-chip">生命 <b id="hud-life">3</b></div>
    <div class="score-chip">关卡 <b id="hud-stage">1/4</b></div>
    <div class="score-chip audio-chip" id="chip-sfx" title="音效开关">🔊</div>
    <div class="score-chip audio-chip" id="chip-bgm" title="BGM 开关">🎵</div>
  </div>
</div>

<div id="toast"></div>

<div id="panel">
  <div class="sec-title">⚔ 战况</div>
  <div class="row"><span>关卡 STAGE</span><span class="val" id="p-stage">1/4</span></div>
  <div class="row"><span>剩余生命</span><span class="val" id="p-life">♥♥♥</span></div>
  <div class="row"><span>金币</span><span class="val" id="p-coin">0</span></div>
  <div class="row"><span>距离</span><span class="val" id="p-dist">0m</span></div>
  <div class="btn-row">
    <button class="gbtn" id="btn-restart">重新开始</button>
    <button class="gbtn" id="btn-cam">视角复位</button>
  </div>
  <div class="btn-row" style="margin-top:6px;">
    <button class="gbtn" id="btn-sfx">音效：开</button>
    <button class="gbtn" id="btn-bgm">BGM：开</button>
  </div>
  <div class="btn-row" style="margin-top:6px;">
    <a class="gbtn" id="btn-quit" href="/games/" style="text-decoration:none;display:block;">← 退出</a>
  </div>
</div>
<button id="panel-toggle" title="收起/展开面板">☰</button>

<div id="win-banner">
  <div id="win-text">胜利</div>
  <div id="win-sub"></div>
  <button id="win-again">再 来 一 局</button>
  <a id="win-quit" href="/games/">← 退出</a>
</div>

<div id="intro">
  <div id="intro-card">
    <div id="intro-title">蘑菇奇兵</div>
    <div id="intro-sub">—— 3D 跑酷冒险 · 踩怪冲旗 ——</div>
    <div class="intro-label">控制方式</div>
    <div id="intro-tip">
      <b>←→</b> 移动 &nbsp;&nbsp; <b>↑ / 空格</b> 跳跃 &nbsp;&nbsp; <b>X / K</b> 攻击冲刺<br>
      收集金币、踩扁蘑菇怪、抵达旗杆即可通关。<br>
      拖动画面旋转视角，滚轮拉近拉远。
      <span class="tip-mobile" style="display:none;"><br>移动端：屏幕左下方向键，右下跳跃键。</span>
    </div>
    <div class="intro-label" style="margin-top:18px;">选择关卡</div>
    <div class="intro-opts" id="intro-stage">
      <div class="intro-opt active" data-v="1">第 1 关</div>
      <div class="intro-opt" data-v="2">第 2 关</div>
      <div class="intro-opt" data-v="3">第 3 关</div>
      <div class="intro-opt" data-v="4">第 4 关</div>
    </div>
    <button id="intro-start">开 始 冒 险</button>
    <a id="intro-quit" href="/games/">退 出</a>
  </div>
</div>

<div id="mobile-controls">
  <div class="pad">
    <button class="up" data-key="up">▲</button>
    <button class="left" data-key="left">◀</button>
    <button class="down" data-key="down">▼</button>
    <button class="right" data-key="right">▶</button>
  </div>
  <div style="display:flex;align-items:flex-end;">
    <button class="firebtn" data-key="firebtn">冲刺</button>
    <button class="jumpbtn" data-key="jumpbtn">跳 跃</button>
  </div>
</div>

<script src="/games/lib/three.r147.min.js"></script>
<script src="/games/lib/OrbitControls.r147.js"></script>
<script>
"use strict";
/* ============================================================
 * 蘑菇奇兵 · 3D 跑酷冒险（横版平台）
 * ============================================================ */
let scene, camera, renderer, controls, clock;
let player = null;            // 玩家 mesh + 状态
let worldGroup = null;        // 当前关世界容器（重建关卡时移除）
let coins = [], enemies = [], platforms = [], flags = [], pits = [];
let stage = 1, startStage = 1, running = false, over = false, interStage = false;
let coinScore = 0, lifeCount = 3, runDist = 0;
let stageEnd = null;           // 旗杆 mesh
const keys = new Set();
const SHAKE = { t:0, amp:0, off:new THREE.Vector3() };

/* ---------- 全局参数 ---------- */
const G = -24;                  // 重力（浮感,跨坑更从容)
const MOVE_SPEED = 8.0;          // 玩家水平速度
const JUMP_VEL = 11.0;           // 跳跃初速度
const DASH_VEL = 14.0;           // 冲刺速度
const DASH_DUR = 0.18;           // 冲刺时长
const DASH_COOL = 0.55;          // 冲刺冷却
const COYOTE_TIME = 0.20;        // 离开平台后仍可起跳的时间窗
const JUMP_BUFFER = 0.22;        // 按跳后在落地瞬间自动触发的窗口
const PLAYER_W = 0.8, PLAYER_H = 1.6, PLAYER_D = 0.8;

/* ---------- 关卡配置（预留 4 关接口，先只填第 1 关，2-4 占位） ---------- */
const STAGES = [
  { // 第 1 关：草地起步，金币 + 蘑菇怪 + 2 段坑 + 旗杆终点
    length: 80,                      // 关卡总长（米）
    groundProfile: [0, 0, 0, -2, 0, 0, -3, 0, 0, -2, 0], // 每段地面状态（0=平台, 负数=坑深度，正数垫高）
    platforms: [
      { x: 18, y: 2.0, w: 4, h: 0.5, d: 3 },
      { x: 30, y: 3.0, w: 3, h: 0.5, d: 3 },
      { x: 40, y: 2.5, w: 5, h: 0.5, d: 3 },
      { x: 52, y: 4.0, w: 3, h: 0.5, d: 3 },
      { x: 60, y: 2.5, w: 6, h: 0.5, d: 3 },
    ],
    coins: [
      { x: 8, y: 2 }, { x: 12, y: 1.5 }, { x: 18, y: 3.5 }, { x: 19, y: 3.5 }, { x: 20, y: 3.5 },
      { x: 30, y: 4.5 }, { x: 40, y: 4 }, { x: 41, y: 4 }, { x: 42, y: 4 },
      { x: 52, y: 5.5 }, { x: 60, y: 4 }, { x: 62, y: 4 }, { x: 64, y: 4 }, { x: 70, y: 2.5 },
    ],
    enemies: [
      { x: 14, type: 'goomba' }, { x: 26, type: 'goomba' }, { x: 35, type: 'goomba' }, { x: 45, type: 'goomba' },
      { x: 56, type: 'goomba' }, { x: 66, type: 'goomba' },
    ],
    pits: [ { x: 22, w: 4 }, { x: 46, w: 5 } ],         // 坑（x = 起点，w = 宽度）
    flagX: 78,
    bg: 0x8ec6e8,           // 天空色
    ground: 0x5a8e3c,
  },
  { // 第 2 关：暂占位（同 1 关数据但有难度提升空间）
    length: 100,
    groundProfile: [0, 0, 0, -2, 0, 0, -3, 0, 0, -2, 0, 0, 0, -3, 0, 0],
    platforms: [
      { x: 18, y: 2.5, w: 4, h: 0.5, d: 3 }, { x: 30, y: 3.5, w: 3, h: 0.5, d: 3 },
      { x: 40, y: 4.0, w: 5, h: 0.5, d: 3 }, { x: 55, y: 4.5, w: 3, h: 0.5, d: 3 },
      { x: 65, y: 3.5, w: 4, h: 0.5, d: 3 }, { x: 80, y: 5.0, w: 3, h: 0.5, d: 3 },
    ],
    coins: [
      { x: 8, y: 2 }, { x: 18, y: 4 }, { x: 30, y: 5 }, { x: 40, y: 5.5 },
      { x: 55, y: 6 }, { x: 65, y: 5 }, { x: 80, y: 6.5 }, { x: 90, y: 2.5 },
    ],
    enemies: [
      { x: 14, type: 'goomba' }, { x: 28, type: 'goomba' }, { x: 38, type: 'goomba' },
      { x: 50, type: 'goomba' }, { x: 62, type: 'goomba' }, { x: 75, type: 'goomba' },
    ],
    pits: [ { x: 22, w: 5 }, { x: 48, w: 6 }, { x: 72, w: 4 } ],
    flagX: 98,
    bg: 0x7fb0d8,
    ground: 0x4d7e35,
  },
  { // 第 3 关
    length: 120,

/* ---------- 音效系统（WebAudio 合成，8-bit 风格） ---------- */
let audioCtx = null, masterGain = null, bgmGain = null, bgmTimer = null;
let sfxMuted = false, bgmMuted = false;
function ensureAudio(){
  if(audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext; if(!AC) return;
  audioCtx = new AC();
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.5; masterGain.connect(audioCtx.destination);
  bgmGain = audioCtx.createGain(); bgmGain.gain.value = 0.0; bgmGain.connect(audioCtx.destination);
}
function tone({freq=440, type='square', dur=0.15, gain=0.3, attack=0.005, slideTo=null, slideTime=null, when=0}){
  if(!audioCtx || sfxMuted) return;
  const t = audioCtx.currentTime + when;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, t);
  if(slideTo){ osc.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), t + (slideTime||dur)); }
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gain, t + attack);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t + dur + 0.02);
}
const SFX = {
  jump(){ tone({freq:520, type:'square', dur:0.15, gain:0.18, slideTo:780, slideTime:0.15}); },
  land(){ tone({freq:180, type:'square', dur:0.06, gain:0.12, slideTo:120, slideTime:0.06}); },
  coin(){ tone({freq:988, type:'square', dur:0.08, gain:0.16}); tone({freq:1319, type:'square', dur:0.12, gain:0.16, when:0.08}); },
  stomp(){ tone({freq:300, type:'square', dur:0.08, gain:0.18, slideTo:120, slideTime:0.08}); tone({freq:200, type:'triangle', dur:0.12, gain:0.14, when:0.05, slideTo:80, slideTime:0.12}); },
  enemyDie(){ tone({freq:400, type:'square', dur:0.18, gain:0.18, slideTo:80, slideTime:0.18}); },
  dash(){ tone({freq:220, type:'sawtooth', dur:0.15, gain:0.13, slideTo:880, slideTime:0.13}); },
  hurt(){ tone({freq:480, type:'square', dur:0.25, gain:0.2, slideTo:120, slideTime:0.25}); },
  death(){
    const notes=[523,494,440,392,330,262];
    notes.forEach((f,i)=> tone({freq:f, type:'square', dur:0.18, gain:0.2, when:i*0.12}));
  },
  stageClear(){
    const notes=[523,659,784,1047,784,1047];
    notes.forEach((f,i)=> tone({freq:f, type:'square', dur:0.2, gain:0.2, when:i*0.13}));
  },
  gameOver(){
    const notes=[392,330,262,196];
    notes.forEach((f,i)=> tone({freq:f, type:'sawtooth', dur:0.4, gain:0.22, when:i*0.18}));
  },
};
function startBGM(){
  if(!audioCtx || bgmMuted || bgmTimer) return;
  bgmGain.gain.linearRampToValueAtTime(0.10, audioCtx.currentTime + 1.0);
  // 欢快 8-bit 主旋律循环
  const melody = [
    [659,0.18],[659,0.18],[0,0.06],[659,0.18],[0,0.06],[523,0.18],[659,0.18],[0,0.06],[784,0.36],
    [0,0.18],[392,0.18],[0,0.06],[523,0.18],[0,0.12],[392,0.12],[0,0.12],[330,0.24],
    [440,0.18],[0,0.18],[659,0.18],[0,0.06],[523,0.12],[0,0.06],[587,0.12],[0,0.06],[494,0.24],
  ];
  const bass = [
    [131,0.36],[196,0.36],[165,0.36],[196,0.36],
    [131,0.36],[196,0.36],[165,0.36],[196,0.36],
  ];
  function loop(){
    if(!audioCtx || bgmMuted){ stopBGM(); return; }
    let when = 0;
    melody.forEach(([f,d])=>{
      if(f>0 && !bgmMuted){
        const t = audioCtx.currentTime + when;
        const osc = audioCtx.createOscillator(); osc.type='square'; osc.frequency.value=f;
        const g = audioCtx.createGain(); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.45,t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+d*0.85);
        osc.connect(g); g.connect(bgmGain); osc.start(t); osc.stop(t+d+0.02);
      }
      when += d;
    });
    bass.forEach(([f,d])=>{
      if(!bgmMuted){
        const t = audioCtx.currentTime + when*0 + (when*d/when);
      }
    });
    bgmTimer = setTimeout(loop, when*1000);
  }
  loop();
}
function stopBGM(){
  if(bgmTimer){ clearTimeout(bgmTimer); bgmTimer=null; }
  if(bgmGain && audioCtx) bgmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
}

function initScene(){

  camera = new THREE.PerspectiveCamera(50, aspect, 0.1, 500);

  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.getElementById('canvas-wrap').appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 1, 0);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  controls.minDistance = 12; controls.maxDistance = 50;
  controls.maxPolarAngle = 1.32; controls.minPolarAngle = 0.4;

  const sun = new THREE.DirectionalLight(0xfff3d0, 1.10);

  sun.shadow.camera.far=120; sun.shadow.bias=-0.0016;
  scene.add(sun);

  addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function clearWorld(){
  if(worldGroup){ scene.remove(worldGroup); worldGroup.traverse(o=>{ if(o.geometry)o.geometry.dispose&&o.geometry.dispose(); }); }
  worldGroup = new THREE.Group(); scene.add(worldGroup);
  coins = []; enemies = []; platforms = []; flags = []; pits = [];
  stageEnd = null;
}

function makeBrickTexture(tint='#a06530'){
  const cv = document.createElement('canvas'); cv.width=cv.height=128;
  const g = cv.getContext('2d');
  g.fillStyle = tint; g.fillRect(0,0,128,128);
  g.fillStyle = '#000'; g.globalAlpha = 0.18;
  for(let r=0;r<5;r++){ g.fillRect(0, r*26+24, 128, 2); }
  g.globalAlpha = 1;
  const t = new THREE.CanvasTexture(cv); t.encoding = THREE.sRGBEncoding; t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}
function makeGroundTexture(base='#5a8e3c'){
  const cv = document.createElement('canvas'); cv.width=cv.height=256;
  const g = cv.getContext('2d');
  g.fillStyle = base; g.fillRect(0,0,256,256);
  for(let i=0;i<60;i++){
    g.fillStyle = `hsl(${90+Math.random()*30}, 50%, ${28+Math.random()*18}%)`;
    g.fillRect(Math.random()*256, Math.random()*256, 4+Math.random()*8, 4+Math.random()*8);
  }
  const t = new THREE.CanvasTexture(cv); t.encoding = THREE.sRGBEncoding; t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}

function addSky(colorHex){
  const skyGeo = new THREE.SphereGeometry(240, 24, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide, fog:false, depthWrite:false, uniforms:{ top:{value:new THREE.Color(colorHex).multiplyScalar(0.7)}, bot:{value:new THREE.Color(colorHex).multiplyScalar(1.4)} },
    vertexShader:'varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader:'uniform vec3 top;uniform vec3 bot;varying vec3 vP;void main(){float h=normalize(vP).y;vec3 c=mix(bot,top,smoothstep(-0.1,0.7,h));gl_FragColor=vec4(c,1.0);}'
  });
  worldGroup.add(new THREE.Mesh(skyGeo, skyMat));
}

function loadStage(){
  clearWorld();
  const s = STAGES[(stage-1) % STAGES.length];
  scene.fog.color.setHex(s.bg);
  addSky(s.bg);

  const groundHex = '#'+(s.ground.toString(16).padStart(6,'0'));
  const groundTex = makeGroundTexture(groundHex);
  groundTex.repeat.set(8, 4);
  const groundMat = new THREE.MeshStandardMaterial({ map:groundTex, roughness:.95 });

  const totalLen = s.length;
  pits = s.pits.map(p=>({ startX:p.x, endX:p.x + p.w })).sort((a,b)=>a.startX-b.startX);
  // Build ground segments = [0, totalLen] minus all pit intervals
  const segs = [];
  let cursor = 0;
  for(const p of pits){
    if(p.startX > cursor) segs.push([cursor, p.startX]);
    cursor = Math.max(cursor, p.endX);
  }
  if(cursor < totalLen) segs.push([cursor, totalLen]);
  for(const [a, b] of segs){
    if(b - a <= 0.01) continue;
    const w = b - a;
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, 1, 6), groundMat);
    m.position.set((a + b)/2, -0.5, 0); m.receiveShadow = true;
    worldGroup.add(m);
    platforms.push({ mesh:m, x:(a + b)/2, y:0, w:w, h:1, d:6, ground:true });
    const grass = new THREE.Mesh(new THREE.BoxGeometry(w, 0.08, 6), new THREE.MeshStandardMaterial({color:0x7adb4e, roughness:.9}));
    grass.position.set((a + b)/2, 0.04, 0); grass.receiveShadow=true; worldGroup.add(grass);
  }

  const startMat = new THREE.MeshStandardMaterial({ map:makeBrickTexture('#a06528'), roughness:.9 });
  const startBlock = new THREE.Mesh(new THREE.BoxGeometry(6, 1, 6), startMat);
  startBlock.position.set(0, -0.5, 0); startBlock.receiveShadow=true; worldGroup.add(startBlock);
  // Register the start platform as a solid ground platform for collision,
  // so the player respawn point (x=-2) above it lands safely.
  platforms.push({ mesh:startBlock, x:0, y:0, w:6, h:1, d:6, ground:true });

  // Visible left boundary wall at stage start (blocks the player from walking
  // off the left edge into empty space). Tall enough to be obvious.
  const wallMat = new THREE.MeshStandardMaterial({ map:makeBrickTexture('#6a3a18'), roughness:.92 });
  const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.6, 3, 6), wallMat);
  leftWall.position.set(-3.3, 1.5, 0); leftWall.castShadow = leftWall.receiveShadow = true;
  worldGroup.add(leftWall);
  platforms.push({ mesh:leftWall, x:-3.3, y:1.5, w:0.6, h:3, d:6, wall:true });

  // Visible right boundary wall just past the flag pole (blocks the player
  // from walking off the right edge past the finish line).
  const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.6, 3, 6), wallMat);
  rightWall.position.set(s.flagX + 4.3, 1.5, 0); rightWall.castShadow = rightWall.receiveShadow = true;
  worldGroup.add(rightWall);
  platforms.push({ mesh:rightWall, x:s.flagX + 4.3, y:1.5, w:0.6, h:3, d:6, wall:true });

  s.platforms.forEach(p => addPlatform(p));
  s.coins.forEach(c => addCoin(c));
  s.enemies.forEach(e => addGoomba(e.x));
  addFlag(s.flagX);

  for(let i=-2; i<totalLen/4 + 2; i++){
    if(Math.random() < 0.5) continue;
    const tx = i*4 + Math.random()*2;
    if(pits.some(p => tx >= p.startX-2 && tx <= p.endX+2)) continue;
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.20, 0.30, 1.5, 8), new THREE.MeshStandardMaterial({color:0x5a3a1e, roughness:.95}));
    trunk.position.y = 0.75; trunk.castShadow=true; tree.add(trunk);
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.1, 12, 8), new THREE.MeshStandardMaterial({color:0x3a8a3a, roughness:.9}));
    leaves.position.y = 2.2; leaves.castShadow=true; tree.add(leaves);
    tree.position.set(tx, 0.5, -6 - Math.random()*4);
    worldGroup.add(tree);
  }
  for(let i=0;i<6;i++){
    const mt = new THREE.Mesh(new THREE.ConeGeometry(8+Math.random()*4, 6+Math.random()*3, 8), new THREE.MeshStandardMaterial({color:0x6a8eb0, roughness:1}));
    mt.position.set(stage*-5 + i*15, 2, -30 - Math.random()*10); worldGroup.add(mt);
  }
}

function resetPlayer(spawnX=1){
  if(player && player.mesh){ scene.remove(player.mesh); }
  const mesh = buildPlayerMesh();
  mesh.position.set(spawnX, 2.0, 0); scene.add(mesh);
  player = {
    mesh, x:spawnX, y:2.0, z:0,
    vx:0, vy:0, vz:0,
    onGround:false, facing:1,
    walkT:0,
    dashT:0, dashCool:0,
    invin:1.5,
    alive:true,
    deadT:0,
    coyote:0,
    jumpBuf:0,
    checkpoint:spawnX,
    prevY:2.0,
  };
}

const PLAYER_HALF_W = PLAYER_W * 0.5;

function land(){ SFX.land(); }

function collidePlatforms(){
  if(!player || !player.alive) return;
  const px = player.x, py = player.y, previousY = player.prevY;
  let landing = null;
  for(const p of platforms){
    if(p.wall) continue;
    const xMin = p.x - p.w/2, xMax = p.x + p.w/2;
    const yTop = p.y + p.h/2;
    const overlapsX = px + PLAYER_HALF_W > xMin + 0.04 && px - PLAYER_HALF_W < xMax - 0.04;
    // A landing is a downward crossing of a top face. This makes every
    // platform one-way and prevents both side-snapping and mid-air catches.
    if(player.vy <= 0 && overlapsX && previousY >= yTop - 0.03 && py <= yTop + 0.03){
      if(!landing || yTop > landing.yTop) landing = { p, yTop };
    }
  }
  if(landing){
    const wasAirborne = !player.onGround;
    player.y = landing.yTop;
    player.vy = 0;
    player.onGround = true;
    if(wasAirborne) land();
  } else {
    player.onGround = false;
  }
}

function updatePlayer(dt){
  if(!player) return;
  if(!player.alive){
    player.deadT += dt;
    player.vy += G * dt;
    player.y += player.vy * dt;
    player.mesh.position.y = player.y;
    player.mesh.rotation.z += dt * 8;
    if(player.deadT > 1.6){
      if(lifeCount > 0){
        lifeCount--; syncHUD();
        if(lifeCount <= 0){ finish(false); }
        else { resetPlayer(player.checkpoint); }
      }
    }
    return;
  }
  player.invin = Math.max(0, player.invin - dt);
  player.dashCool = Math.max(0, player.dashCool - dt);

  let ax = 0;
  if(keys.has('left') || keys.has('a')) ax = -1;
  else if(keys.has('right') || keys.has('d')) ax = 1;

  if((keys.has('firebtn') || keys.has('x') || keys.has('k')) && player.dashCool<=0 && player.onGround){
    player.dashT = DASH_DUR;
    player.dashCool = DASH_COOL;
    SFX.dash();
  }
  let speed = MOVE_SPEED;
  if(player.dashT > 0){ speed = DASH_VEL; player.dashT -= dt; }

  if(ax !== 0){
    player.vx = ax * speed;
    player.facing = ax;
  } else {
    player.vx *= 0.78;
    if(Math.abs(player.vx) < 0.05) player.vx = 0;
  }

  // Track jump-buffer (input came in) and coyote (left platform recently).
  if(keys.has('up') || keys.has('w') || keys.has('jumpbtn') || keys.has(' ')){
    if(!player._jumpHeld){
      player.jumpBuf = JUMP_BUFFER;
      player._jumpHeld = true;
    }
  } else {
    player._jumpHeld = false;
  }
  player.jumpBuf = Math.max(0, player.jumpBuf - dt);

  const wasOnGround = player.onGround;
  if(wasOnGround){ player.coyote = COYOTE_TIME; } else { player.coyote = Math.max(0, player.coyote - dt); }

  const canJumpNow = player.jumpBuf > 0 && (player.onGround || player.coyote > 0);
  if(canJumpNow){
    player.vy = JUMP_VEL;
    player.onGround = false;
    player.coyote = 0;
    player.jumpBuf = 0;
    SFX.jump();
  }

  player.vy += G * dt;
  if(player.vy < -25) player.vy = -25;

  player.prevY = player.y;
  player.x += player.vx * dt;
  player.y += player.vy * dt;
  if(player.y < -10){ player.alive = false; player.vy = 6; SFX.death(); return; }
  if(player.x < -2.5) player.x = -2.5;  // left boundary wall
  const s = STAGES[(stage-1) % STAGES.length];
  if(player.x > s.flagX + 3.5) player.x = s.flagX + 3.5;  // right boundary wall

  collidePlatforms();
  if(player.onGround && player.x > player.checkpoint + 1){
    player.checkpoint = player.x;
  }

  player.mesh.position.set(player.x, player.y + 0.05, 0);
  // Keep the mascot always facing the camera; signal direction via slight
  // whole-body lean on the z-axis (looking-from-the-side into screen).
  player.mesh.rotation.y = 0;
  if(Math.abs(player.vx) > 0.5 && player.onGround){
    player.walkT += dt * 8;
    player.mesh.rotation.z = Math.sin(player.walkT) * 0.08 + player.facing * 0.06;
  } else {
    player.walkT = 0;
    player.mesh.rotation.z *= 0.85;
  }
  player.mesh.visible = !(player.invin > 0 && Math.floor(player.invin*16)%2===0);
}

function updateCoins(dt){
  coins.forEach(c=>{
    if(c.taken) return;
    c.mesh.rotation.y += dt * 3;
    c.mesh.position.y = c.baseY + Math.sin(clock.elapsedTime*3 + c.x) * 0.15;
    if(player && player.alive && Math.abs(player.x - c.x) < 0.7 && Math.abs(player.y + 1.2 - c.y) < 1.0){
      c.taken = true; c.mesh.visible = false;
      coinScore++; syncHUD(); SFX.coin();
    }
  });
}

function updateEnemies(dt){
  enemies.forEach(e=>{
    if(e.dead){
      e.deadT += dt;
      e.mesh.position.y -= dt * 1.5;
      e.mesh.rotation.x += dt * 8;
      e.mesh.visible = e.deadT < 0.6;
      return;
    }
    if(!e.alive) return;
    e.x += e.vx * dt;
    if(e.x < e.patrolMin || e.x > e.patrolMax){
      e.vx = -e.vx;
      e.x = Math.max(e.patrolMin, Math.min(e.patrolMax, e.x));
    }
    e.walkT += dt * 4;
    e.mesh.position.x = e.x;
    e.mesh.position.y = Math.abs(Math.sin(e.walkT)) * 0.1;
    e.mesh.rotation.y = e.vx > 0 ? Math.PI/2 : -Math.PI/2;

    if(player && player.alive && player.invin <= 0 && Math.abs(player.x - e.x) < 0.95 && Math.abs(player.y - e.y) < 1.15){
      // Stomp: player moving downward and roughly above the goomba's head.
      const stomping = player.vy < 0 && player.prevY >= e.y + 0.72;
      if(stomping){
        e.dead = true; e.alive = false;
        player.vy = JUMP_VEL * 0.75;
        player.invin = 0.1;
        SFX.stomp(); SFX.enemyDie();
      } else {
        player.alive = false; player.vy = 10; SFX.hurt();
        setTimeout(()=>{ SFX.death(); }, 100);
      }
    }
  });
}

function updateFlag(dt){
  if(!stageEnd) return;
  if(stageEnd.winT > 0){
    stageEnd.winT += dt;
    stageEnd.cloth.position.y = stageEnd.baseY - Math.min(stageEnd.winT * 3, 4);
    return;
  }
  if(player && player.alive && player.x > stageEnd.x - 0.6){
    stageEnd.winT = 0.01;
    SFX.stageClear();
    setTimeout(()=>{ if(stage < TOTAL_STAGES){ nextStage(); } else { finish(true); } }, 1400);
  }
}

function syncHUD(){
  document.getElementById('hud-coin').textContent = coinScore;
  document.getElementById('hud-life').textContent = lifeCount;
  document.getElementById('hud-stage').textContent = stage + '/' + TOTAL_STAGES;
  document.getElementById('p-stage').textContent = stage + '/' + TOTAL_STAGES;
  document.getElementById('p-life').textContent = lifeCount>0 ? '♥'.repeat(lifeCount) : '—';
  document.getElementById('p-coin').textContent = coinScore;
  if(player) document.getElementById('p-dist').textContent = Math.max(0, Math.round(player.x)) + 'm';
}

function toast(text, danger){
  const el = document.getElementById('toast'); el.textContent = text;
  el.classList.toggle('danger', !!danger); el.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>el.classList.remove('show'), 1600);
}

function startGame(){
  ensureAudio();
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
  stage = startStage;
  coinScore = 0; lifeCount = 3;
  loadStage();
  resetPlayer();
  syncHUD();
  camera.position.set(player.x - 6, 6, 18);
  controls.target.set(player.x, 1, 0);
  document.getElementById('win-banner').classList.remove('show');
  document.getElementById('intro').classList.add('hide');
  over = false; running = true; interStage = false;
  toast('起跑！');
  if(!bgmMuted) startBGM();
}

function nextStage(){
  if(interStage) return;
  interStage = true; running = false;
  const banner = document.getElementById('win-banner');
  document.getElementById('win-text').textContent = `第 ${stage} 关 通过`;
  document.getElementById('win-text').style.color = '#f0c75e';
  document.getElementById('win-sub').textContent = `金币 ${coinScore}　·　生命 ${lifeCount}　·　下一关：第 ${stage+1} 关`;
  const btn = document.getElementById('win-again');
  btn.textContent = '进 入 下 一 关';
  btn.dataset.mode = 'next';
  banner.classList.add('show');
  stopBGM();
}

function advanceToStage(){
  stage++;
  loadStage();
  resetPlayer();
  syncHUD();
  camera.position.set(player.x - 6, 6, 18);
  controls.target.set(player.x, 1, 0);
  document.getElementById('win-banner').classList.remove('show');
  over = false; running = true; interStage = false;
  toast(`第 ${stage} 关 · 起跑`);
  if(!bgmMuted) startBGM();
}

function finish(win){
  if(over) return; over = true; running = false; interStage = false;
  document.getElementById('win-text').textContent = win ? '全线通关 · 冒险结束' : 'GAME OVER';
  document.getElementById('win-text').style.color = win ? '#f0c75e' : '#ff8a75';
  document.getElementById('win-sub').textContent = `金币 ${coinScore}　·　剩余生命 ${lifeCount}`;
  const btn = document.getElementById('win-again');
  btn.textContent = '再 来 一 局';
  btn.dataset.mode = 'again';
  document.getElementById('win-banner').classList.add('show');
  stopBGM();
  if(win){ SFX.stageClear(); }
  else { SFX.gameOver(); }
}

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(0.035, clock.getDelta());
  camera.position.sub(SHAKE.off); SHAKE.off.set(0,0,0);
  if(player && running){
    const targetX = player.x - 6, targetY = player.y + 4;
    camera.position.x += (targetX - camera.position.x) * 0.08;
    camera.position.y += (targetY - camera.position.y) * 0.08;
    controls.target.set(player.x, player.y + 1, 0);
  }
  controls.update();
  if(running){
    updatePlayer(dt);
    updateCoins(dt);
    updateEnemies(dt);
    updateFlag(dt);
    syncHUD();
  }
  if(SHAKE.t>0){
    SHAKE.t-=dt; const a=SHAKE.amp*(SHAKE.t/0.5);
    SHAKE.off.set((Math.random()-.5)*a,(Math.random()-.5)*a,(Math.random()-.5)*a);
    camera.position.add(SHAKE.off);
  }
  renderer.render(scene, camera);
}

const KEYMAP = ['arrowleft','arrowright','arrowup','arrowdown',' ','a','d','w','s','x','k','j'];
const KEY_ALIAS = { arrowleft:'left', arrowright:'right', arrowup:'up', arrowdown:'down' };
function normKey(k){ return KEY_ALIAS[k] || k; }
addEventListener('keydown', e=>{
  const k = normKey(e.key.toLowerCase());
  if(KEYMAP.includes(k) || KEYMAP.includes(e.key.toLowerCase())){ keys.add(k); if(k===' '||k==='up'||k==='down') e.preventDefault(); }
});
addEventListener('keyup', e=>{ keys.delete(normKey(e.key.toLowerCase())); });
document.querySelectorAll('#mobile-controls [data-key]').forEach(btn=>{
  const key = btn.dataset.key;
  ['pointerdown','pointerup','pointercancel','pointerleave'].forEach(type=>{
    btn.addEventListener(type, e=>{ e.preventDefault(); type==='pointerdown'?keys.add(key):keys.delete(key); });
  });
});

function bindUI(){
  document.getElementById('intro-stage').addEventListener('click', e=>{
    const opt = e.target.closest('.intro-opt'); if(!opt) return;
    document.querySelectorAll('#intro-stage .intro-opt').forEach(o=>o.classList.remove('active'));
    opt.classList.add('active'); startStage = parseInt(opt.dataset.v, 10);
  });
  document.getElementById('intro-start').addEventListener('click', startGame);
  document.getElementById('win-again').addEventListener('click', ()=>{
    const mode = document.getElementById('win-again').dataset.mode;
    if(mode==='next') advanceToStage(); else startGame();
  });
  document.getElementById('btn-restart').addEventListener('click', startGame);
  document.getElementById('btn-sfx').addEventListener('click', ()=>{
    sfxMuted = !sfxMuted;
    document.getElementById('btn-sfx').textContent = '音效：' + (sfxMuted?'关':'开');
    document.getElementById('chip-sfx').classList.toggle('off', sfxMuted);
    document.getElementById('chip-sfx').textContent = sfxMuted?'🔇':'🔊';
  });
  document.getElementById('btn-bgm').addEventListener('click', ()=>{
    bgmMuted = !bgmMuted;
    document.getElementById('btn-bgm').textContent = 'BGM：' + (bgmMuted?'关':'开');
    document.getElementById('chip-bgm').classList.toggle('off', bgmMuted);
    if(bgmMuted) stopBGM(); else if(running && !over) startBGM();
  });
  document.getElementById('chip-sfx').addEventListener('click', ()=>{
    sfxMuted = !sfxMuted;
    document.getElementById('chip-sfx').classList.toggle('off', sfxMuted);
    document.getElementById('chip-sfx').textContent = sfxMuted?'🔇':'🔊';
    document.getElementById('btn-sfx').textContent = '音效：' + (sfxMuted?'关':'开');
  });
  document.getElementById('chip-bgm').addEventListener('click', ()=>{
    bgmMuted = !bgmMuted;
    document.getElementById('chip-bgm').classList.toggle('off', bgmMuted);
    document.getElementById('btn-bgm').textContent = 'BGM：' + (bgmMuted?'关':'开');
    if(bgmMuted) stopBGM(); else if(running && !over) startBGM();
  });
  document.getElementById('btn-cam').addEventListener('click', ()=>{
    if(player){
      camera.position.set(player.x - 6, 6, 18);
      controls.target.set(player.x, 1, 0);
    }
  });
  const panel=document.getElementById('panel'), tog=document.getElementById('panel-toggle');
  tog.addEventListener('click', ()=>panel.classList.toggle('collapsed'));
}

function boot(){
  initScene();
  stage = 1;
  loadStage();
  resetPlayer();
  syncHUD();
  bindUI();
  animate();
}
boot();
</script>
