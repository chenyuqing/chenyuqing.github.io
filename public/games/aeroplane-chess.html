<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#14100c">
<title>云端翔行 · 3D 飞行棋</title>
<style>
  :root{--gold:#D4A017;--gold-light:#F0C75E;--zhu:#C0392B;--zhu-dark:#8E2A20;--ink:#14100c;--paper:#f5e6c8;--panel-bg:rgba(24,20,12,.9)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;touch-action:manipulation}
  html,body{width:100%;height:100%;overflow:hidden;background:#14100c;font-family:"KaiTi","STKaiti","楷体",serif}
  #canvas-wrap{position:fixed;inset:0;touch-action:none}
  canvas{display:block;touch-action:none}
  #topbar{position:fixed;top:0;left:0;right:0;height:64px;z-index:20;pointer-events:none;display:flex;align-items:center;justify-content:space-between;padding:0 22px;padding-top:env(safe-area-inset-top);background:linear-gradient(180deg,rgba(10,8,5,.85),rgba(10,8,5,0))}
  #game-title{font-size:28px;font-weight:bold;letter-spacing:5px;color:var(--gold-light);text-shadow:0 0 18px rgba(212,160,23,.55),0 2px 4px #000;pointer-events:auto}
  #game-title small{font-size:13px;letter-spacing:2px;color:#cbb37a;margin-left:9px}
  #home-link{display:inline-flex;align-items:center;margin-left:16px;padding:9px 14px;border:2px solid #f5da84;border-radius:6px;background:#d4a017;color:#1a1208;font-family:system-ui,sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;text-decoration:none;box-shadow:0 3px 12px rgba(0,0,0,.48);pointer-events:auto}
  #home-link:hover{background:#f5da84}
  #turn-badge{pointer-events:auto;font-size:18px;letter-spacing:3px;padding:7px 20px;border-radius:30px;border:2px solid var(--gold);color:#fff;background:linear-gradient(135deg,var(--zhu),var(--zhu-dark));box-shadow:0 0 16px rgba(192,57,43,.6);transition:all .4s}
  #turn-badge.c0{background:linear-gradient(135deg,#C0392B,#8E2A20)}
  #turn-badge.c1{background:linear-gradient(135deg,#D4A017,#9a7412)}
  #turn-badge.c2{background:linear-gradient(135deg,#2C6FBB,#1a4a82)}
  #turn-badge.c3{background:linear-gradient(135deg,#27A050,#178038)}
  #toast{position:fixed;top:82px;left:50%;transform:translateX(-50%) scale(.8);z-index:30;font-size:26px;font-weight:bold;letter-spacing:4px;color:var(--gold-light);text-shadow:0 0 24px rgba(212,160,23,.8),0 3px 6px #000;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) scale(1)}
  #toast.danger{color:#ff6b5e}
  #win-banner{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:40;text-align:center;transition:transform .5s cubic-bezier(.2,1.6,.4,1);pointer-events:none}
  #win-banner.show{transform:translate(-50%,-50%) scale(1);pointer-events:auto}
  #win-text{font-size:60px;font-weight:bold;letter-spacing:10px;color:var(--gold-light);text-shadow:0 0 40px rgba(212,160,23,.9),0 4px 8px #000}
  #win-sub{font-size:20px;color:#e8d5ae;margin-top:12px;letter-spacing:3px}
  #win-again{margin-top:24px;font-family:inherit;font-size:20px;letter-spacing:5px;cursor:pointer;padding:12px 42px;border-radius:40px;border:2px solid var(--gold);color:#1a1208;background:linear-gradient(180deg,var(--gold-light),var(--gold));box-shadow:0 6px 20px rgba(0,0,0,.6)}
  #win-again:hover{filter:brightness(1.12)}
  #panel{position:fixed;top:76px;right:14px;width:240px;z-index:25;background:var(--panel-bg);border:2px solid rgba(212,160,23,.5);border-radius:14px;backdrop-filter:blur(6px);padding:14px;transition:transform .4s;box-shadow:0 10px 30px rgba(0,0,0,.55);padding-right:calc(14px + env(safe-area-inset-right))}
  #panel.collapsed{transform:translateX(calc(100% + 20px))}
  .sec-title{font-size:14px;color:var(--gold);letter-spacing:3px;margin:0 0 8px;border-bottom:1px solid rgba(212,160,23,.35);padding-bottom:4px}
  .row{display:flex;justify-content:space-between;align-items:center;margin:7px 0;font-size:14px;color:#e8d5ae}
  .row .val{color:var(--gold-light);font-weight:bold}
  .btn-row{display:flex;gap:8px;margin-top:12px}
  .gbtn{flex:1;font-family:inherit;font-size:15px;letter-spacing:1px;cursor:pointer;padding:9px 6px;border-radius:9px;border:1.5px solid rgba(212,160,23,.55);background:rgba(60,44,26,.55);color:#e8d5ae;transition:all .18s;text-align:center}
  .gbtn:hover{border-color:var(--gold-light);color:#fff;box-shadow:0 0 10px rgba(212,160,23,.4)}
  .gbtn:disabled{opacity:.4;cursor:not-allowed}
  #panel-toggle{position:fixed;top:84px;right:14px;z-index:26;width:40px;height:40px;border-radius:50%;border:2px solid var(--gold);background:var(--panel-bg);color:var(--gold-light);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:right .4s;box-shadow:0 4px 12px rgba(0,0,0,.5)}
  #panel:not(.collapsed)~#panel-toggle{right:258px}
  #intro{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(20,14,8,.55),rgba(8,6,4,.94));transition:opacity .6s}
  #intro.hide{opacity:0;pointer-events:none}
  #intro-card{width:min(560px,92vw);max-height:92vh;overflow-y:auto;text-align:center;padding:36px 40px 30px;background:linear-gradient(160deg,#f7ead0,#ecd9b4);border-radius:16px;border:3px solid var(--gold);box-shadow:0 0 0 6px rgba(142,42,32,.35),0 30px 80px rgba(0,0,0,.8);position:relative}
  #intro-title{font-size:46px;letter-spacing:10px;color:var(--zhu-dark);text-shadow:0 2px 0 #fff3dd;margin:6px 0 2px}
  #intro-sub{font-size:16px;color:#7a5c2e;letter-spacing:3px;margin-bottom:20px}
  #intro-tip{font-size:14px;color:#5c4320;line-height:1.7;margin-bottom:18px}
  #intro-tip b{color:var(--zhu-dark)}
  #intro-start{margin-top:8px;font-family:inherit;font-size:26px;font-weight:bold;letter-spacing:9px;cursor:pointer;padding:14px 60px;border-radius:44px;border:none;color:#fff6df;background:linear-gradient(180deg,#d2483a,#8E2A20);box-shadow:0 8px 24px rgba(142,42,32,.55);transition:all .18s}
  #intro-start:hover{transform:scale(1.05)}
  #intro-exit{display:block;width:max-content;margin:14px auto 0;font-family:inherit;font-size:16px;color:#7a5c2e;text-decoration:none;letter-spacing:3px;padding:8px 24px;border:1.5px solid #b48a3e;border-radius:24px}
  @media(max-width:820px){#game-title{font-size:18px;letter-spacing:2px}#game-title small{display:none}#home-link{margin-left:8px;padding:7px 9px;font-size:12px}#turn-badge{font-size:14px;padding:5px 12px;letter-spacing:1px}#topbar{height:52px;padding:0 12px}#panel{width:min(82vw,220px);top:58px}#panel-toggle{top:64px}#intro-title{font-size:30px;letter-spacing:6px}#intro-sub{font-size:13px}#intro-tip{font-size:12px}#intro-start{font-size:21px;padding:12px 44px;letter-spacing:6px}#win-text{font-size:40px;letter-spacing:6px}}
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="topbar">
  <div id="game-title">云端翔行<small>3D 飞行棋</small><a id="home-link" href="/games/">返回游戏专区</a></div>
  <div id="turn-badge">红方回合</div>
</div>

<div id="toast"></div>

<div id="win-banner">
  <div id="win-text">胜利</div>
  <div id="win-sub"></div>
  <button id="win-again">再 来 一 局</button>
</div>

<div id="panel">
  <div class="sec-title">战况</div>
  <div class="row"><span>当前回合</span><span class="val" id="p-turn">红方</span></div>
  <div class="row"><span>骰子点数</span><span class="val" id="p-dice">—</span></div>
  <div class="row"><span>红方到家</span><span class="val" id="p-home-0">0/4</span></div>
  <div class="row"><span>黄方到家</span><span class="val" id="p-home-1">0/4</span></div>
  <div class="row"><span>蓝方到家</span><span class="val" id="p-home-2">0/4</span></div>
  <div class="row"><span>绿方到家</span><span class="val" id="p-home-3">0/4</span></div>
  <div class="btn-row">
    <button class="gbtn" id="btn-roll">掷骰</button>
    <button class="gbtn" id="btn-restart">重开</button>
  </div>
  <div class="btn-row" style="margin-top:6px;">
    <button class="gbtn" id="btn-sound">音效：开</button>
    <button class="gbtn" id="btn-camera">视角复位</button>
  </div>
</div>
<button id="panel-toggle" title="收起/展开面板">☰</button>

<div id="intro">
  <div id="intro-card">
    <div id="intro-title">云端翔行</div>
    <div id="intro-sub">—— 3D 飞行棋 · 四方竞速 ——</div>
    <div id="intro-tip">
      你执 <b>红方</b>，其余三方由电脑控制。<br>
      掷出 <b>6</b> 才能起飞，并可再掷一次。<br>
      走到对方飞机所在格，将其击落回基地。<br>
      四架飞机全部抵达中央终点者获胜。<br>
      拖动旋转视角，滚轮拉近拉远。
    </div>
    <button id="intro-start">起 飞</button>
    <a id="intro-exit" href="/games/">退出</a>
  </div>
</div>

<script src="/games/lib/three.r147.min.js"></script>
<script src="/games/lib/OrbitControls.r147.js"></script>
<script>
"use strict";
/* 云端翔行 · 3D 飞行棋 */
let scene,camera,renderer,controls,clock;
const COLORS=[
  {hex:0xC0392B,name:'红方',mat:null},
  {hex:0xD4A017,name:'黄方',mat:null},
  {hex:0x2C6FBB,name:'蓝方',mat:null},
  {hex:0x27A050,name:'绿方',mat:null}
];
const RING=[]; // 48 格外圈，顺时针，index 0 = 红色起点 (0,6)
(function buildRing(){
  for(let i=0;i<=6;i++) RING.push([i,6]);        // [0..6] 底边右半
  for(let i=1;i<=12;i++) RING.push([6,6-i]);      // [7..18] 右边
  for(let i=1;i<=12;i++) RING.push([6-i,-6]);     // [19..30] 顶边
  for(let i=1;i<=12;i++) RING.push([-6,-6+i]);    // [31..42] 左边
  for(let i=1;i<=5;i++) RING.push([-6+i,6]);       // [43..47] 底边左半
})();
const RING_LEN=RING.length; // 48
const START_INDEX=[0,12,24,36]; // 红黄蓝绿起点
const HOME_LEN=6;
// 终点跑道：从起点前一格沿直线向中心 (0,0)
const HOME_PATHS=[
  [[0,5],[0,4],[0,3],[0,2],[0,1],[0,0]], // 红 从底边中部向上
  [[5,0],[4,0],[3,0],[2,0],[1,0],[0,0]], // 黄 从右边中部向左
  [[0,-5],[0,-4],[0,-3],[0,-2],[0,-1],[0,0]], // 蓝
  [[-5,0],[-4,0],[-3,0],[-2,0],[-1,0],[0,0]]  // 绿
];
// 基地停机位
const BASES=[
  [[-5,5],[-3,5],[-5,3],[-3,3]],
  [[5,5],[3,5],[5,3],[3,3]],
  [[5,-5],[3,-5],[5,-3],[3,-3]],
  [[-5,-5],[-3,-5],[-5,-3],[-3,-3]]
];
// 玩家状态
let players=[];
let turn=0;
let dice=0;
let phase='idle'; // idle | rolling | awaiting | moving | over
let winner=-1;
let muted=false;
let audioCtx=null;
let canRollAgain=false;
let highlightMeshes=[];

function tone(freq,dur=.1,type='square',vol=.15,slideTo){
  if(muted) return;
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  const t=audioCtx.currentTime,o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo),t+dur);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.005);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g).connect(audioCtx.destination);o.start(t);o.stop(t+dur+0.02);
}
const SFX={
  roll(){tone(220,.05,'square',.12);setTimeout(()=>tone(330,.05,'square',.1),60);setTimeout(()=>tone(440,.08,'square',.1),120)},
  dice(){tone(520,.08,'triangle',.14)},
  takeoff(){tone(300,.15,'sawtooth',.13,700)},
  move(){tone(440,.05,'sine',.1,560)},
  capture(){tone(180,.2,'sawtooth',.16,90)},
  home(){tone(660,.1,'triangle',.14);setTimeout(()=>tone(880,.12,'triangle',.14),100);setTimeout(()=>tone(1100,.18,'triangle',.16),200)},
  win(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,.3,'triangle',.18),i*150))}
};

function worldPos(c,r,y=0){return {x:c,y,z:r}}

function initScene(){
  scene=new THREE.Scene();
  scene.fog=new THREE.Fog(0x1a1410,40,90);
  clock=new THREE.Clock();
  camera=new THREE.PerspectiveCamera(48,innerWidth/innerHeight,0.1,200);
  camera.position.set(0,22,20);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  document.getElementById('canvas-wrap').appendChild(renderer.domElement);
  controls=new THREE.OrbitControls(camera,renderer.domElement);
  controls.target.set(0,0,0);
  controls.enableDamping=true;controls.dampingFactor=0.08;
  controls.minDistance=14;controls.maxDistance=50;
  controls.maxPolarAngle=1.35;controls.minPolarAngle=0.25;
  controls.enablePan=false;
  scene.add(new THREE.HemisphereLight(0xfff0d0,0x44301a,0.7));
  const sun=new THREE.DirectionalLight(0xfff3d0,1.1);
  sun.position.set(10,30,12);sun.castShadow=true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.left=-16;sun.shadow.camera.right=16;sun.shadow.camera.top=16;sun.shadow.camera.bottom=-16;
  sun.shadow.camera.far=80;sun.shadow.bias=-0.0012;
  scene.add(sun);
  addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}

function makeWoodTexture(){
  const cv=document.createElement('canvas');cv.width=cv.height=256;
  const g=cv.getContext('2d');
  g.fillStyle='#6a4220';g.fillRect(0,0,256,256);
  for(let i=0;i<40;i++){g.strokeStyle=`rgba(40,25,12,${0.15+Math.random()*0.2})`;g.lineWidth=1+Math.random()*2;g.beginPath();g.moveTo(Math.random()*256,0);g.lineTo(Math.random()*256+10,256);g.stroke()}
  for(let i=0;i<80;i++){g.fillStyle=`rgba(${120+Math.random()*40},${70+Math.random()*30},${30+Math.random()*20},${0.1+Math.random()*0.15})`;g.fillRect(Math.random()*256,Math.random()*256,3+Math.random()*6,3+Math.random()*6)}
  const t=new THREE.CanvasTexture(cv);t.encoding=THREE.sRGBEncoding;t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;
}

function buildBoard(){
  const board=new THREE.Group();
  const woodTex=makeWoodTexture();
  const boardMat=new THREE.MeshStandardMaterial({map:woodTex,roughness:.9});
  const base=new THREE.Mesh(new THREE.BoxGeometry(16,0.5,16),boardMat);
  base.position.y=-0.25;base.receiveShadow=true;board.add(base);
  const cellMat=new THREE.MeshStandardMaterial({color:0x2a1d10,roughness:.8});
  const lineMat=new THREE.MeshStandardMaterial({color:0xd4a017,roughness:.6,metalness:.2});
  // 外圈格子
  RING.forEach((p,i)=>{
    const cell=new THREE.Mesh(new THREE.BoxGeometry(0.95,0.1,0.95),cellMat);
    cell.position.set(p[0],0.05,p[1]);cell.receiveShadow=true;
    board.add(cell);
    // 起点格染色
    const si=START_INDEX.indexOf(i);
    if(si>=0){
      const startCol=new THREE.Mesh(new THREE.BoxGeometry(0.92,0.02,0.92),new THREE.MeshStandardMaterial({color:COLORS[si].hex,roughness:.5,metalness:.3}));
      startCol.position.set(p[0],0.11,p[1]);board.add(startCol);
    }
  });
  // 终点跑道
  HOME_PATHS.forEach((path,pi)=>{
    path.forEach((p,hi)=>{
      if(pi>=0 && hi<HOME_LEN-1){
        const cell=new THREE.Mesh(new THREE.BoxGeometry(0.85,0.1,0.85),new THREE.MeshStandardMaterial({color:0x1a1208,roughness:.8}));
        cell.position.set(p[0],0.05,p[1]);cell.receiveShadow=true;board.add(cell);
        const ring=new THREE.Mesh(new THREE.RingGeometry(0.2,0.4,16),new THREE.MeshBasicMaterial({color:COLORS[pi].hex,side:THREE.DoubleSide}));
        ring.rotation.x=-Math.PI/2;ring.position.set(p[0],0.11,p[1]);board.add(ring);
      }
    });
  });
  // 中心终点（金字塔）
  const centerMat=new THREE.MeshStandardMaterial({color:0xd4a017,metalness:.7,roughness:.25});
  const center=new THREE.Mesh(new THREE.ConeGeometry(1.4,1.8,4),centerMat);
  center.position.y=0.9;center.rotation.y=Math.PI/4;center.castShadow=true;board.add(center);
  // 基地停机坪
  BASES.forEach((base,bi)=>{
    const zoneMat=new THREE.MeshStandardMaterial({color:COLORS[bi].hex,transparent:true,opacity:.25,roughness:.7});
    const zone=new THREE.Mesh(new THREE.PlaneGeometry(3.8,3.8),zoneMat);
    zone.rotation.x=-Math.PI/2;zone.position.set(base[0][0]+1,0.02,base[0][1]+1);board.add(zone);
    base.forEach(p=>{
      const pad=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.08,16),new THREE.MeshStandardMaterial({color:COLORS[bi].hex,roughness:.6}));
      pad.position.set(p[0],0.04,p[1]);pad.castShadow=true;board.add(pad);
    });
  });
  scene.add(board);
}

function makePlane(colorIdx){
  const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:COLORS[colorIdx].hex,metalness:.2,roughness:.5});
  const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.12,0.3,4,8),mat);
  body.rotation.z=Math.PI/2;body.castShadow=true;g.add(body);
  const wing=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.04,0.18),mat);wing.castShadow=true;g.add(wing);
  const tail=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.04,0.12),mat);tail.position.x=-0.22;g.add(tail);
  const nose=new THREE.Mesh(new THREE.ConeGeometry(0.12,0.18,8),mat);
  nose.rotation.z=-Math.PI/2;nose.position.x=0.28;g.add(nose);
  const prop=new THREE.Mesh(new THREE.BoxGeometry(0.02,0.3,0.04),new THREE.MeshStandardMaterial({color:0x222,roughness:.8}));
  prop.position.x=0.4;prop.name='prop';g.add(prop);
  return g;
}

function planePosition(player,planeIdx){
  const p=players[player].planes[planeIdx];
  if(p.state==='base') return BASES[player][planeIdx];
  if(p.state==='ring') return RING[p.pos];
  if(p.state==='home') return HOME_PATHS[player][p.pos];
  if(p.state==='done') return [0,0];
  return [0,0];
}

function placePlane(player,planeIdx){
  const p=players[player].planes[planeIdx];
  const mesh=p.mesh;
  if(!mesh) return;
  const [c,r]=planePosition(player,planeIdx);
  let y=0.25;
  if(p.state==='done'){y=0.6+planeIdx*0.05;mesh.position.set(c*0.3,y,r*0.3);mesh.visible=true;return}
  // 叠放偏移
  let stackOffset=0;
  players.forEach((pl,pi)=>{
    pl.planes.forEach((pp,pj)=>{
      if((pi===player&&pj===planeIdx))return;
      if(pp.state===p.state){
        if(p.state==='ring'&&pp.pos===p.pos) stackOffset+=0.12;
        if(p.state==='home'&&pp.pos===p.pos&&pi===player) stackOffset+=0.12;
      }
    });
  });
  mesh.position.set(c,y+stackOffset,r);
  mesh.rotation.z = Math.PI/2; // 机头朝飞行方向（简化：朝外圈顺时针）
  mesh.visible=true;
}

function buildPlayers(){
  players=COLORS.map((c,i)=>({
    color:i,
    planes:Array.from({length:4},(_,j)=>{
      const mesh=makePlane(i);
      scene.add(mesh);
      return {mesh,state:'base',pos:0,planeIdx:j};
    })
  }));
  for(let i=0;i<4;i++) for(let j=0;j<4;j++) placePlane(i,j);
}

function resetGame(){
  // 清除旧棋子
  if(players.length){
    players.forEach(pl=>pl.planes.forEach(p=>scene.remove(p.mesh)));
  }
  turn=0;dice=0;phase='idle';winner=-1;canRollAgain=false;
  clearHighlight();
  buildPlayers();
  document.getElementById('win-banner').classList.remove('show');
  updateHUD();
  updateTurnBadge();
}

function clearHighlight(){
  highlightMeshes.forEach(m=>scene.remove(m));
  highlightMeshes=[];
}

function showHighlight(){
  clearHighlight();
  if(phase!=='awaiting') return;
  const movable=getMovablePlanes(turn,dice);
  movable.forEach(pi=>{
    const p=players[turn].planes[pi];
    const [c,r]=planePosition(turn,pi);
    const ring=new THREE.Mesh(new THREE.RingGeometry(0.3,0.5,20),new THREE.MeshBasicMaterial({color:0x7CFC00,side:THREE.DoubleSide,transparent:true,opacity:.8}));
    ring.rotation.x=-Math.PI/2;ring.position.set(c,0.12,r);
    ring.userData.planeIdx=pi;
    highlightMeshes.push(ring);scene.add(ring);
  });
}

function getMovablePlanes(player,d){
  const res=[];
  players[player].planes.forEach((p,i)=>{
    if(p.state==='done') return;
    if(p.state==='base'){ if(d===6) res.push(i); }
    else if(p.state==='ring'){
      const stepsToHome=ringStepsToHome(player,p.pos);
      if(d<=stepsToHome+HOME_LEN) res.push(i);
    }
    else if(p.state==='home'){
      if(p.pos+d<HOME_LEN) res.push(i); // 未到中心
      else if(p.pos+d===HOME_LEN-1) res.push(i); // 刚好到中心
    }
  });
  return res;
}

function ringStepsToHome(player,pos){
  // 从当前 pos 走到进入终点跑道入口所需的剩余外圈步数
  const entry=(START_INDEX[player]+RING_LEN-1)%RING_LEN; // 终点跑道入口在外圈的位置（起点前一格）
  let steps=(entry-pos+RING_LEN)%RING_LEN;
  return steps; // 走完 steps 步后下一格进入终点跑道
}

function pathAfter(player,planeIdx,dice){
  // 计算移动后的状态和路径
  const p=players[player].planes[planeIdx];
  if(p.state==='base'){
    if(dice!==6) return null;
    return {newState:'ring',newPos:START_INDEX[player],path:[{state:'ring',pos:START_INDEX[player]}]};
  }
  if(p.state==='ring'){
    const stepsToHome=ringStepsToHome(player,p.pos);
    const path=[];
    let cur=p.pos;
    if(dice<=stepsToHome){
      for(let s=1;s<=dice;s++){cur=(cur+1)%RING_LEN;path.push({state:'ring',pos:cur})}
      return {newState:'ring',newPos:cur,path};
    } else {
      // 进入终点跑道
      let remaining=dice-stepsToHome-1; // 走完 stepsToHome 步到入口，再+1进入跑道第0格... 
      // 实际：走 stepsToHome 步到达入口格（外圈），下一步进入跑道
      for(let s=1;s<=stepsToHome;s++){cur=(cur+1)%RING_LEN;path.push({state:'ring',pos:cur})}
      // 现在在入口，继续走 remaining+1 步进入跑道
      let hp=-1; // 跑道索引
      let totalLeft=dice-stepsToHome;
      for(let s=1;s<=totalLeft;s++){
        hp++;
        if(hp>=HOME_LEN){
          // 超过中心，反弹
          const over=hp-(HOME_LEN-1);
          hp=HOME_LEN-1-over;
          if(hp<0) return null; // 无法走
        }
        path.push({state:'home',pos:hp});
      }
      if(path.length===0) return null;
      const last=path[path.length-1];
      if(last.state==='home'&&last.pos===HOME_LEN-1) return {newState:'done',newPos:0,path};
      return {newState:last.state,newPos:last.pos,path};
    }
  }
  if(p.state==='home'){
    const np=p.pos+dice;
    if(np===HOME_LEN-1) return {newState:'done',newPos:0,path:[{state:'home',pos:np}]};
    if(np<HOME_LEN-1) return {newState:'home',newPos:np,path:[{state:'home',pos:np}]};
    // 超过，反弹
    const over=np-(HOME_LEN-1);
    const rp=HOME_LEN-1-over;
    if(rp<0) return null;
    return {newState:'home',newPos:rp,path:[{state:'home',pos:rp}]};
  }
  return null;
}

function rollDice(){
  if(phase!=='idle'||winner>=0) return;
  phase='rolling';
  SFX.roll();
  // 骰子动画
  let rolls=0;
  const interval=setInterval(()=>{
    dice=1+Math.floor(Math.random()*6);
    document.getElementById('p-dice').textContent=dice;
    tone(300+Math.random()*200,.03,'square',.06);
    rolls++;
    if(rolls>10){
      clearInterval(interval);
      dice=1+Math.floor(Math.random()*6);
      document.getElementById('p-dice').textContent=dice;
      SFX.dice();
      onDiceRolled();
    }
  },50);
}

function onDiceRolled(){
  const movable=getMovablePlanes(turn,dice);
  if(movable.length===0){
    toast(`${COLORS[turn].name}掷出${dice}，无可动飞机`,true);
    setTimeout(()=>{ canRollAgain=false; nextTurn() },1200);
    return;
  }
  if(turn===0){
    phase='awaiting';
    showHighlight();
    toast(`掷出 ${dice}，点击高亮飞机移动`);
  } else {
    // AI 选择
    const pi=aiPickPlane(turn,dice,movable);
    setTimeout(()=>executeMove(turn,pi),600);
  }
}

function aiPickPlane(player,d,movable){
  // 简单策略：优先进终点 > 吃子 > 起飞 > 普通移动
  let best=movable[0],bestScore=-1;
  for(const pi of movable){
    const result=pathAfter(player,pi,d);
    if(!result) continue;
    let score=Math.random()*0.1;
    if(result.newState==='done') score+=100;
    if(result.newState==='home') score+=30+result.newPos*5;
    if(result.newState==='ring'){
      // 检查能否吃子
      const last=result.path[result.path.length-1];
      if(last.state==='ring'){
        for(let oi=0;oi<4;oi++){
          if(oi===player) continue;
          for(const opp of players[oi].planes){
            if(opp.state==='ring'&&opp.pos===last.pos){score+=50;break}
          }
        }
      }
      if(players[player].planes[pi].state==='base') score+=20; // 起飞
    }
    if(score>bestScore){bestScore=score;best=pi}
  }
  return best;
}

function executeMove(player,planeIdx){
  if(phase==='over') return;
  phase='moving';
  clearHighlight();
  const p=players[player].planes[planeIdx];
  const result=pathAfter(player,planeIdx,dice);
  if(!result){ phase='idle'; return }
  const wasBase=p.state==='base';
  // 沿 path 逐步移动
  let step=0;
  const animateStep=()=>{
    if(step>=result.path.length){
      p.state=result.newState;
      p.pos=result.newPos;
      placePlane(player,planeIdx);
      onMoveDone(player,planeIdx);
      return;
    }
    const target=result.path[step];
    p.state=target.state;
    p.pos=target.pos;
    placePlane(player,planeIdx);
    SFX.move();
    step++;
    setTimeout(animateStep,180);
  };
  if(wasBase) SFX.takeoff();
  animateStep();
}

function onMoveDone(player,planeIdx){
  const p=players[player].planes[planeIdx];
  // 吃子检查
  if(p.state==='ring'){
    let captured=false;
    for(let oi=0;oi<4;oi++){
      if(oi===player) continue;
      for(const opp of players[oi].planes){
        if(opp.state==='ring'&&opp.pos===p.pos){
          opp.state='base';opp.pos=0;
          placePlane(oi,players[oi].planes.indexOf(opp));
          SFX.capture();
          toast(`${COLORS[player].name}击落${COLORS[oi].name}飞机！`,true);
          captured=true;
        }
      }
    }
    if(captured){setTimeout(()=>{checkWin(player);if(winner<0) afterMove(player)},500);return}
  }
  if(p.state==='done') SFX.home();
  checkWin(player);
  if(winner<0) afterMove(player);
}

function afterMove(player){
  // 掷6可再掷一次，否则切换回合
  if(dice===6 && winner<0){
    canRollAgain=true;
    if(player===0){
      phase='idle';
      toast('掷出6，再掷一次！');
      updateHUD();
    } else {
      setTimeout(()=>{ if(phase==='idle') return; rollDice() },700);
    }
  } else {
    canRollAgain=false;
    nextTurn();
  }
}

function nextTurn(){
  if(winner>=0) return;
  turn=(turn+1)%4;
  phase='idle';
  updateTurnBadge();
  updateHUD();
  if(turn!==0){
    setTimeout(()=>{
      if(winner<0&&phase==='idle') rollDice();
    },800);
  } else {
    toast('你的回合');
  }
}

function checkWin(player){
  const home=players[player].planes.filter(p=>p.state==='done').length;
  document.getElementById('p-home-'+player).textContent=home+'/4';
  if(home===4){
    winner=player;
    phase='over';
    SFX.win();
    document.getElementById('win-text').textContent=player===0?'胜利！':`${COLORS[player].name}获胜`;
    document.getElementById('win-text').style.color=player===0?'#f0c75e':'#ff8a75';
    document.getElementById('win-sub').textContent=`四架飞机全部抵达终点`;
    document.getElementById('win-banner').classList.add('show');
  }
}

function updateHUD(){
  document.getElementById('p-turn').textContent=COLORS[turn].name;
  document.getElementById('p-dice').textContent=dice||'—';
  for(let i=0;i<4;i++){
    document.getElementById('p-home-'+i).textContent=players[i].planes.filter(p=>p.state==='done').length+'/4';
  }
  const btn=document.getElementById('btn-roll');
  btn.disabled=(phase!=='idle'||turn!==0||winner>=0);
}

function updateTurnBadge(){
  const b=document.getElementById('turn-badge');
  b.textContent=COLORS[turn].name+'回合';
  b.className='c'+turn;
}

function toast(msg,danger){
  const el=document.getElementById('toast');el.textContent=msg;
  el.classList.toggle('danger',!!danger);el.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),1600);
}

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  if(controls) controls.update();
  // 螺旋桨
  scene.traverse(o=>{ if(o.name==='prop') o.rotation.x=now*0.02 });
  // 高亮脉动
  highlightMeshes.forEach(m=>{ m.scale.setScalar(1+0.15*Math.sin(now*0.005)) });
  renderer.render(scene,camera);
}

// 点击棋子
const raycaster=new THREE.Raycaster();
const pointer=new THREE.Vector2();
let downXY=null;
renderer&&renderer.domElement.addEventListener('pointerdown',e=>{downXY={x:e.clientX,y:e.clientY}});
renderer&&renderer.domElement.addEventListener('pointerup',e=>{
  if(!downXY) return;
  const dist=Math.hypot(e.clientX-downXY.x,e.clientY-downXY.y);
  downXY=null;
  if(dist>8) return;
  if(phase!=='awaiting'||turn!==0) return;
  const rect=renderer.domElement.getBoundingClientRect();
  pointer.x=((e.clientX-rect.left)/rect.width)*2-1;
  pointer.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  // 检查高亮环
  const hits=raycaster.intersectObjects(highlightMeshes,false);
  if(hits.length){
    const pi=hits[0].object.userData.planeIdx;
    executeMove(0,pi);
  }
});

function bindUI(){
  document.getElementById('intro-start').onclick=()=>{ if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)(); resetGame(); document.getElementById('intro').classList.add('hide') };
  document.getElementById('win-again').onclick=()=>resetGame();
  document.getElementById('btn-roll').onclick=rollDice;
  document.getElementById('btn-restart').onclick=resetGame;
  document.getElementById('btn-sound').onclick=()=>{ muted=!muted; document.getElementById('btn-sound').textContent='音效：'+(muted?'关':'开') };
  document.getElementById('btn-camera').onclick=()=>{ camera.position.set(0,22,20);controls.target.set(0,0,0);controls.update() };
  document.getElementById('panel-toggle').onclick=()=>{document.getElementById('panel').classList.toggle('collapsed')};
}

initScene();
buildBoard();
buildPlayers();
updateHUD();
updateTurnBadge();
bindUI();
animate();
</script>
