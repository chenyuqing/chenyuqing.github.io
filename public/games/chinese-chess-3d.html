<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>楚汉争锋 · 3D中国象棋</title>
<style>
  :root{
    --gold:#D4A017; --gold-light:#F0C75E; --zhu:#C0392B; --zhu-dark:#8E2A20;
    --ink:#1a2430; --paper:#f5e6c8; --paper-dark:#e8d5ae; --panel-bg:rgba(26,20,14,.88);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
  html,body{width:100%;height:100%;overflow:hidden;background:#14100c;font-family:"KaiTi","STKaiti","楷体",serif;}
  #canvas-wrap{position:fixed;inset:0;touch-action:none;}
  canvas{display:block;touch-action:none;}

  /* ===== 顶部横幅 ===== */
  #topbar{
    position:fixed;top:0;left:0;right:0;height:64px;z-index:20;pointer-events:none;
    display:flex;align-items:center;justify-content:space-between;padding:0 22px;
    padding-top:env(safe-area-inset-top);
    background:linear-gradient(180deg,rgba(10,8,5,.85),rgba(10,8,5,0));
  }
  #game-title{
    font-size:30px;font-weight:bold;letter-spacing:6px;color:var(--gold-light);
    text-shadow:0 0 18px rgba(212,160,23,.55),0 2px 4px #000;pointer-events:auto;user-select:none;
  }
   #game-title small{font-size:14px;letter-spacing:2px;color:#cbb37a;margin-left:10px;}
   #home-link{display:inline-flex;align-items:center;margin-left:18px;padding:10px 16px;border:2px solid #f5da84;border-radius:6px;background:#d4a017;color:#1a1208;font-family:system-ui,sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;text-decoration:none;text-shadow:none;vertical-align:middle;box-shadow:0 3px 12px rgba(0,0,0,.48);}
   #home-link:hover{background:#f5da84;transform:translateY(-1px);}
  #turn-badge{
    pointer-events:auto;user-select:none;font-size:20px;letter-spacing:3px;padding:8px 22px;border-radius:30px;
    border:2px solid var(--gold);color:#fff;background:linear-gradient(135deg,var(--zhu),var(--zhu-dark));
    box-shadow:0 0 16px rgba(192,57,43,.6);transition:all .4s;
  }
  #turn-badge.black{background:linear-gradient(135deg,#2C3E50,#151f2b);box-shadow:0 0 16px rgba(44,62,80,.8);}

  /* ===== 中央提示 ===== */
  #toast{
    position:fixed;top:84px;left:50%;transform:translateX(-50%) scale(.8);z-index:30;
    font-size:34px;font-weight:bold;letter-spacing:8px;color:var(--gold-light);
    text-shadow:0 0 24px rgba(212,160,23,.8),0 3px 6px #000;opacity:0;transition:all .35s;pointer-events:none;
    white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) scale(1);}
  #toast.danger{color:#ff6b5e;text-shadow:0 0 24px rgba(255,60,40,.9),0 3px 6px #000;}

  /* ===== 胜负结算 ===== */
  #win-banner{
    position:fixed;top:38%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:40;text-align:center;
    transition:transform .5s cubic-bezier(.2,1.6,.4,1);pointer-events:none;
  }
  #win-banner.show{transform:translate(-50%,-50%) scale(1);pointer-events:auto;}
  #win-text{
    font-size:72px;font-weight:bold;letter-spacing:14px;color:var(--gold-light);
    text-shadow:0 0 40px rgba(212,160,23,.9),0 0 80px rgba(192,57,43,.6),0 4px 8px #000;
  }
  #win-sub{font-size:22px;color:#e8d5ae;margin-top:12px;letter-spacing:4px;}
  #win-again{
    margin-top:26px;font-family:inherit;font-size:22px;letter-spacing:6px;cursor:pointer;
    padding:12px 42px;border-radius:40px;border:2px solid var(--gold);color:#1a1208;
    background:linear-gradient(180deg,var(--gold-light),var(--gold));box-shadow:0 6px 20px rgba(0,0,0,.6);
  }
  #win-again:hover{filter:brightness(1.12);}

  /* ===== 右侧控制面板 ===== */
  #panel{
    position:fixed;top:76px;right:14px;bottom:14px;width:262px;z-index:25;
    background:var(--panel-bg);border:2px solid rgba(212,160,23,.5);border-radius:14px;
    backdrop-filter:blur(6px);padding:14px 14px 10px;overflow-y:auto;overflow-x:hidden;
    transition:transform .4s;box-shadow:0 10px 30px rgba(0,0,0,.55);
    padding-right:calc(14px + env(safe-area-inset-right));
    padding-bottom:calc(14px + env(safe-area-inset-bottom));
  }
  #panel.collapsed{transform:translateX(calc(100% + 16px));}
  #panel::-webkit-scrollbar{width:6px;}
  #panel::-webkit-scrollbar-thumb{background:rgba(212,160,23,.4);border-radius:3px;}
  #panel-toggle{
    position:fixed;top:84px;right:14px;z-index:26;width:40px;height:40px;border-radius:50%;
    border:2px solid var(--gold);background:var(--panel-bg);color:var(--gold-light);
    font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:right .4s;box-shadow:0 4px 12px rgba(0,0,0,.5);
  }
  #panel:not(.collapsed)~#panel-toggle,#panel-toggle.moved{right:290px;}
  .sec-title{
    font-size:15px;color:var(--gold);letter-spacing:3px;margin:12px 0 8px;
    border-bottom:1px solid rgba(212,160,23,.35);padding-bottom:4px;
  }
  .sec-title:first-child{margin-top:0;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
  .gbtn{
    flex:1;min-width:104px;font-family:inherit;font-size:17px;letter-spacing:2px;cursor:pointer;
    padding:9px 6px;border-radius:9px;border:1.5px solid rgba(212,160,23,.55);
    background:rgba(60,44,26,.55);color:#e8d5ae;transition:all .18s;text-align:center;user-select:none;
  }
  .gbtn:hover{border-color:var(--gold-light);color:#fff;box-shadow:0 0 10px rgba(212,160,23,.4);}
  .gbtn.active{
    background:linear-gradient(180deg,var(--gold-light),var(--gold));color:#241a06;font-weight:bold;
    box-shadow:0 0 14px rgba(212,160,23,.65);border-color:var(--gold-light);
  }
  .gbtn.wide{min-width:100%;}
  .gbtn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
  #captured-box{
    margin-top:6px;font-size:19px;line-height:1.7;min-height:56px;
    background:rgba(0,0,0,.3);border-radius:8px;padding:6px 10px;
  }
  #captured-box .cap-r{color:#ff8a75;}
  #captured-box .cap-b{color:#9fb6cc;}
  #captured-box .cap-label{font-size:14px;color:#a98d55;letter-spacing:2px;}
  #status-line{margin-top:10px;font-size:15px;color:#cbb37a;line-height:1.5;min-height:44px;}

  /* ===== 吃子全屏特效（闪光 + 毛笔字） ===== */
  #screen-flash{
    position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0;
    background:radial-gradient(ellipse at center,rgba(255,196,106,.5) 0%,rgba(210,60,32,.42) 62%,rgba(120,10,0,.62) 100%);
  }
  #screen-flash.on{animation:flashA .55s ease-out;}
  @keyframes flashA{0%{opacity:0;}12%{opacity:1;}100%{opacity:0;}}
  #brush-overlay{
    position:fixed;inset:0;z-index:61;pointer-events:none;display:flex;align-items:center;justify-content:center;
  }
  #brush-word{
    font-family:"STXingkai","华文行楷","STKaiti","KaiTi",serif;font-size:44vh;font-weight:bold;line-height:1;
    opacity:0;transform:rotate(-4deg);user-select:none;
    text-shadow:0 0 6px rgba(255,243,208,.95),0 0 34px rgba(255,180,60,.9),8px 10px 0 rgba(50,0,0,.55),-3px -3px 0 rgba(255,220,150,.4);
  }
  #brush-word.on{animation:brushA 1.25s cubic-bezier(.16,1.1,.3,1);}
  @keyframes brushA{
    0%{opacity:0;transform:scale(3.2) rotate(-14deg);filter:blur(14px);}
    14%{opacity:1;transform:scale(1) rotate(-3deg);filter:blur(0);}
    72%{opacity:1;transform:scale(.99) rotate(-3deg);}
    100%{opacity:0;transform:scale(.92) rotate(-3deg);filter:blur(2px);}
  }
  /* 墨迹飞溅（字的四周，随字动画同步炸开） */
  .ink-dot{position:absolute;border-radius:50%;background:currentColor;opacity:0;filter:blur(1px);}
  #brush-overlay.on .ink-dot{animation:inkA .9s ease-out;}
  @keyframes inkA{0%{opacity:.9;transform:scale(.3);}100%{opacity:0;transform:scale(1.6) translate(var(--dx),var(--dy));}}

  /* ===== 开场引导 ===== */
  #intro{
    position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,rgba(20,14,8,.55),rgba(8,6,4,.92));
    transition:opacity .6s;
  }
  #intro.hide{opacity:0;pointer-events:none;}
  #intro-card{
    width:min(620px,92vw);max-height:92vh;overflow-y:auto;text-align:center;padding:38px 44px 34px;
    background:linear-gradient(160deg,#f7ead0,#ecd9b4);border-radius:16px;
    border:3px solid var(--gold);box-shadow:0 0 0 6px rgba(142,42,32,.35),0 30px 80px rgba(0,0,0,.8);
    position:relative;
  }
  #intro-card::before,#intro-card::after{
    content:"";position:absolute;left:14px;right:14px;height:8px;
    background:repeating-linear-gradient(90deg,var(--zhu) 0 14px,var(--gold) 14px 28px);border-radius:4px;
  }
  #intro-card::before{top:8px;} #intro-card::after{bottom:8px;}
  #intro-title{font-size:52px;letter-spacing:12px;color:var(--zhu-dark);text-shadow:0 2px 0 #fff3dd;margin:6px 0 2px;}
  #intro-sub{font-size:18px;color:#7a5c2e;letter-spacing:4px;margin-bottom:20px;}
  .intro-sec{margin:16px 0;}
  .intro-label{font-size:19px;color:#5c4320;letter-spacing:3px;margin-bottom:9px;font-weight:bold;}
  .intro-opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .intro-opt{
    font-family:inherit;font-size:19px;letter-spacing:2px;cursor:pointer;user-select:none;
    padding:11px 22px;border-radius:11px;border:2px solid #b48a3e;background:#fff8e8;color:#5c4320;transition:all .16s;
  }
  .intro-opt:hover{border-color:var(--zhu);transform:translateY(-2px);}
  .intro-opt.active{background:var(--zhu);color:#ffe9c9;border-color:var(--zhu-dark);box-shadow:0 6px 16px rgba(142,42,32,.4);}
   #intro-start,#intro-exit{
     margin-top:24px;font-family:inherit;font-size:27px;font-weight:bold;letter-spacing:10px;cursor:pointer;
     padding:15px 66px;border-radius:44px;border:none;color:#fff6df;
     background:linear-gradient(180deg,#d2483a,#8E2A20);box-shadow:0 8px 24px rgba(142,42,32,.55),inset 0 2px 0 rgba(255,255,255,.25);
     transition:all .18s;text-decoration:none;
   }
   #intro-start:hover,#intro-exit:hover{transform:scale(1.05);box-shadow:0 12px 32px rgba(142,42,32,.7),inset 0 2px 0 rgba(255,255,255,.3);}
   #intro-exit{display:block;width:max-content;margin:14px auto 0;}
  #intro-tip{margin-top:16px;font-size:14.5px;color:#8a6d42;line-height:1.7;}
  @media (max-width:760px){
     #game-title{font-size:18px;letter-spacing:2px;}
     #game-title small{display:none;}
     #home-link{margin-left:8px;padding:8px 10px;font-size:13px;}
    #turn-badge{font-size:16px;padding:6px 14px;letter-spacing:2px;}
    #topbar{height:52px;padding:0 12px;}
    #panel{width:min(88vw,320px);top:60px;right:8px;bottom:8px;padding:10px 10px 8px;}
    #panel-toggle{top:68px;right:8px;}
    #panel:not(.collapsed)~#panel-toggle,#panel-toggle.moved{right:min(calc(88vw + 16px),336px);}
    .gbtn{font-size:15px;padding:10px 6px;min-height:44px;min-width:90px;}
    .sec-title{font-size:13px;margin:10px 0 6px;}
    #captured-box{font-size:17px;}
    #status-line{font-size:13px;}
    #toast{top:62px;font-size:22px;letter-spacing:4px;max-width:calc(100vw - 32px);text-align:center;white-space:normal;}
    #intro-title{font-size:32px;letter-spacing:6px;}
    #intro-sub{font-size:14px;letter-spacing:2px;}
    .intro-opt{font-size:16px;padding:9px 14px;}
     #intro-start,#intro-exit{font-size:22px;padding:13px 50px;letter-spacing:8px;}
    #brush-word{font-size:38vh;}
    #win-text{font-size:48px;letter-spacing:10px;}
  }
  @media (max-width:760px) and (orientation:portrait){
    .gbtn{font-size:16px;}
    #intro-card{padding:28px 22px 26px;}
  }
  @media (max-height:500px) and (orientation:landscape){
    #topbar{height:44px;}
    #game-title{font-size:16px;}
    #turn-badge{font-size:14px;padding:4px 12px;}
    #panel{width:180px;top:52px;padding:8px;}
    .sec-title{font-size:12px;margin:6px 0 4px;}
    .gbtn{font-size:13px;padding:6px 4px;min-height:34px;}
    #captured-box{font-size:15px;min-height:40px;}
    #status-line{font-size:12px;min-height:34px;}
    #intro-card{padding:20px 30px 18px;}
    #intro-title{font-size:28px;margin:0;}
    #intro-sub{font-size:13px;margin-bottom:12px;}
    .intro-sec{margin:10px 0;}
    .intro-label{font-size:15px;margin-bottom:6px;}
    #intro-start{font-size:20px;padding:10px 50px;margin-top:16px;}
    #intro-tip{font-size:12px;margin-top:10px;}
    #brush-word{font-size:34vh;}
    #win-text{font-size:42px;letter-spacing:8px;}
  }
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="topbar">
  <div id="game-title">楚汉争锋<small>3D 中国象棋 · 儿童战场版</small><a id="home-link" href="/games/">返回游戏专区</a></div>
  <div id="turn-badge">红方走棋</div>
</div>

<div id="toast"></div>

<div id="screen-flash"></div>
<div id="brush-overlay"><div id="brush-word"></div></div>

<div id="win-banner">
  <div id="win-text">红方胜利</div>
  <div id="win-sub"></div>
  <button id="win-again">再 来 一 局</button>
</div>

<div id="panel">
  <div class="sec-title">⚙ 对局控制</div>
  <div class="btn-row">
    <button class="gbtn" id="btn-restart">🔄 重新开始</button>
    <button class="gbtn" id="btn-undo">↩ 悔棋</button>
  </div>
  <div class="btn-row" style="margin-top:8px;">
    <button class="gbtn" id="btn-hint">💡 提示走法</button>
    <button class="gbtn" id="btn-camera">🎥 视角复位</button>
  </div>
  <div class="btn-row" style="margin-top:8px;">
    <button class="gbtn wide" id="btn-sound">🔊 音效：开</button>
  </div>
  <div class="btn-row" style="margin-top:8px;">
    <button class="gbtn wide" id="btn-bgm">🎵 背景音乐：开</button>
  </div>

  <div class="sec-title">🎭 棋子模式</div>
  <div class="btn-row">
    <button class="gbtn active" id="btn-style-classic">圆棋</button>
    <button class="gbtn" id="btn-style-figure">形象</button>
  </div>

  <div class="sec-title">🏳 被吃棋子</div>
  <div id="captured-box">
    <div><span class="cap-label">红方损失：</span><span class="cap-r" id="cap-red">无</span></div>
    <div><span class="cap-label">黑方损失：</span><span class="cap-b" id="cap-black">无</span></div>
  </div>

  <div class="sec-title">📜 战况</div>
  <div id="status-line">点击己方棋子，绿色光圈是可走位置，红色光圈可吃子。</div>
</div>
<button id="panel-toggle" class="moved" title="收起/展开面板">☰</button>

<div id="intro">
  <div id="intro-card">
    <div id="intro-title">楚汉争锋</div>
    <div id="intro-sub">—— 3D 中国象棋 · 小小将军养成记 ——</div>
    <div class="intro-sec">
      <div class="intro-label">第一步：选择对手</div>
      <div class="intro-opts" id="intro-mode">
        <div class="intro-opt active" data-v="pvc-easy">🤖 电脑·简单</div>
        <div class="intro-opt" data-v="pvc-normal">🤖 电脑·普通</div>
        <div class="intro-opt" data-v="pvc-hard">🤖 电脑·困难</div>
        <div class="intro-opt" data-v="pvp">👫 双人对战</div>
      </div>
    </div>
    <div class="intro-sec">
      <div class="intro-label">第二步：选择棋子样子</div>
      <div class="intro-opts" id="intro-style">
        <div class="intro-opt active" data-v="classic">⭕ 传统圆棋</div>
        <div class="intro-opt" data-v="figure">🐎 立体形象（将军/战马/火炮…）</div>
      </div>
    </div>
    <button id="intro-start">开 战</button>
    <a id="intro-exit" href="/games/">退出</a>
    <div id="intro-tip">玩法：点击棋子 → 绿色光圈是可以走的位置，红色光圈可以吃掉对方棋子。<br>拖动画面可以旋转战场视角，滚轮可以拉近拉远。对局中随时可以切换棋子样子哦！</div>
  </div>
</div>

<script src="/games/lib/three.r147.min.js"></script>
<script src="/games/lib/OrbitControls.r147.js"></script>
<script>
"use strict";
/* ============================================================
 * 楚汉争锋 · 3D 中国象棋（儿童战场版）
 * 单文件实现：3D战场 / 双模式棋子 / 完整规则 / AI / 特效 / 合成音效
 * ============================================================ */

// ---------------- 基础常量 ----------------
const CELL = 2, ROWS = 10, COLS = 9;
const BOARD_TOP_Y = 1.0;                 // 棋盘表面高度
const gx = c => (c - 4) * CELL;          // 列 → 世界x
const gz = r => (r - 4.5) * CELL;        // 行 → 世界z
const RED = 'r', BLACK = 'b';
const CH_NAME = { r: { K:'帥', A:'仕', B:'相', N:'傌', R:'俥', C:'炮', P:'兵' },
                  b: { K:'將', A:'士', B:'象', N:'馬', R:'車', C:'砲', P:'卒' } };
const PIECE_VALUE = { K:6000, R:600, N:270, C:300, B:120, A:120, P:60 };

// ---------------- 全局状态 ----------------
let scene, camera, renderer, controls, clock;
let boardState = [];        // [10][9] → piece 或 null
let pieces = [];            // 所有存活棋子对象
let turn = RED;
let selected = null;        // 当前选中棋子
let legalTargets = [];      // 当前选中棋子的合法落点
let moveHistory = [];       // 走子记录（悔棋用）
let gameMode = 'pvc-easy';  // pvp / pvc-easy / pvc-normal / pvc-hard
let pieceStyle = 'classic'; // classic / figure
let busy = false;           // 动画或AI思考期间锁定输入
let gameOver = false;
let boardMeshes = {};       // 棋盘相关 mesh 引用
let flagCloths = [];        // 飘动旗帜
let torchLights = [];       // 火把光源
let waterMesh = null, waterBase = null;
const tweens = [], bursts = [], projectiles = [];
let shakeT = 0, shakeAmp = 0;
const shakeOff = new THREE.Vector3();
let gameSeq = 0;            // 对局序号：防止AI延时/悔棋/重开竞态
let capturedByBlack = [], capturedByRed = []; // 被吃棋子类型记录

// ================= 音效引擎（Web Audio 程序化合成） =================
const SFX = {
  ctx: null, muted: false, windGain: null,
  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return; }
    this.startWind();
  },
  now() { return this.ctx ? this.ctx.currentTime : 0; },
  env(g, t0, a, peak, d) { // 包络
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(peak, t0 + a);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + a + d);
  },
  tone(freq, dur, type, vol, slideTo) {
    if (!this.ctx || this.muted) return;
    const t0 = this.now(), o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t0 + dur);
    this.env(g, t0, 0.008, vol || 0.2, dur);
    o.connect(g).connect(this.ctx.destination); o.start(t0); o.stop(t0 + dur + 0.05);
  },
  noise(dur, vol, filterFreq, slideTo, q) {
    if (!this.ctx || this.muted) return;
    const t0 = this.now(), len = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const f = this.ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.setValueAtTime(filterFreq || 800, t0);
    f.Q.value = q || 0.8;
    if (slideTo) f.frequency.exponentialRampToValueAtTime(Math.max(40, slideTo), t0 + dur);
    const g = this.ctx.createGain(); this.env(g, t0, 0.005, vol || 0.3, dur);
    src.connect(f).connect(g).connect(this.ctx.destination); src.start(t0);
  },
  select() { this.tone(720, 0.09, 'triangle', 0.12, 900); },
  move()   { this.noise(0.09, 0.25, 1400, 300); this.tone(210, 0.13, 'sine', 0.28, 120); },
  capture(){ this.tone(180, 0.3, 'sine', 0.4, 55); this.noise(0.22, 0.32, 900, 150); },
  cannonFire() {
    this.noise(0.5, 0.55, 2500, 90, 1.2); this.tone(90, 0.55, 'sine', 0.55, 32);
    setTimeout(() => this.tone(1500, 0.4, 'sine', 0.07, 350), 60); // 呼啸
  },
  boom()   { this.noise(0.7, 0.6, 1800, 60); this.tone(70, 0.7, 'sine', 0.6, 28); },
  check()  { this.tone(880, 0.14, 'square', 0.10); setTimeout(() => this.tone(660, 0.2, 'square', 0.10), 160); },
  illegal(){ this.tone(160, 0.18, 'sawtooth', 0.10, 110); },
  win()    { [523,659,784,1047,1319].forEach((f,i) => setTimeout(() => this.tone(f, 0.34, 'triangle', 0.22), i*150)); },
  lose()   { [440,392,330,262].forEach((f,i) => setTimeout(() => this.tone(f, 0.4, 'triangle', 0.2), i*200)); },
  startWind() { // 战场风声氛围
    if (!this.ctx) return;
    const len = this.ctx.sampleRate * 3, buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate), d = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < len; i++) { const w = Math.random()*2-1; last = (last + 0.02*w)/1.02; d[i] = last*3.2; }
    const src = this.ctx.createBufferSource(); src.buffer = buf; src.loop = true;
    const f = this.ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 320; f.Q.value = 0.5;
    this.windGain = this.ctx.createGain(); this.windGain.gain.value = this.muted ? 0 : 0.05;
    src.connect(f).connect(this.windGain).connect(this.ctx.destination); src.start();
    // 风声起伏
    const lfo = this.ctx.createOscillator(), lg = this.ctx.createGain();
    lfo.frequency.value = 0.13; lg.gain.value = 90; lfo.connect(lg).connect(f.frequency); lfo.start();
  },
  toggle() {
    this.muted = !this.muted;
    if (this.windGain) this.windGain.gain.value = this.muted ? 0 : 0.05;
    return !this.muted;
  }
};

// ================= 背景音乐（Web Audio 程序化合成：古筝 + 战鼓 + 箫，D宫五声调式） =================
const BGM = {
  on: true, timer: null, step: 0, nextT: 0, gain: null,
  STEP_DUR: 60 / 76 / 2,   // 八分音符 @ 76 BPM
  // 16 步主弦（古筝），0 = 休止
  MEL: [293.66, 369.99, 440, 493.88, 440, 369.99, 329.63, 293.66,
        246.94, 293.66, 369.99, 440, 369.99, 329.63, 293.66, 0],
  BASS: { 0: 146.83, 4: 123.47, 8: 110.00, 12: 146.83 }, // 低音拨奏
  start() {
    if (!SFX.ctx || this.timer) return;
    if (SFX.ctx.state === 'suspended') SFX.ctx.resume();
    if (!this.gain) { this.gain = SFX.ctx.createGain(); this.gain.gain.value = 1; this.gain.connect(SFX.ctx.destination); }
    this.step = 0;
    const t0 = SFX.now() + 0.02;
    this.playStep(0, t0);
    this.nextT = t0 + this.STEP_DUR;
    this.timer = setInterval(() => this.schedule(), 120);
  },
  stop() { if (this.timer) { clearInterval(this.timer); this.timer = null; } },
  schedule() { // lookahead 调度：提前 0.35s 排音符，避免主线程抖动走音
    while (this.nextT < SFX.now() + 0.35) {
      this.playStep(this.step, this.nextT);
      this.nextT += this.STEP_DUR;
      this.step = (this.step + 1) % 16;
    }
  },
  pluck(freq, t, vol) { // 古筝拨弦：基频 + 高八度泛音，快攻慢衰
    const c = SFX.ctx, v0 = vol || 0.15;
    [[1, v0], [2, v0 * 0.32]].forEach(([mult, v]) => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'triangle'; o.frequency.value = freq * mult;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(v, t + 0.006);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
      o.connect(g).connect(this.gain); o.start(t); o.stop(t + 0.6);
    });
  },
  drum(t, big) { // 战鼓：低频下滑 + 鼓皮噪声
    const c = SFX.ctx, o = c.createOscillator(), g = c.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(big ? 150 : 108, t);
    o.frequency.exponentialRampToValueAtTime(big ? 44 : 58, t + 0.18);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(big ? 0.42 : 0.24, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
    o.connect(g).connect(this.gain); o.start(t); o.stop(t + 0.32);
    const len = Math.floor(c.sampleRate * 0.08), buf = c.createBuffer(1, len, c.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = c.createBufferSource(); src.buffer = buf;
    const nf = c.createBiquadFilter(); nf.type = 'lowpass'; nf.frequency.value = big ? 850 : 1400;
    const ng = c.createGain(); ng.gain.value = big ? 0.16 : 0.1;
    src.connect(nf).connect(ng).connect(this.gain); src.start(t);
  },
  pad(t) { // 箫：D 和弦长音垫底（两小节），缓慢呼吸包络
    const c = SFX.ctx, dur = this.STEP_DUR * 16;
    [293.66, 440, 587.33].forEach(f => {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.035, t + dur * 0.3);
      g.gain.linearRampToValueAtTime(0.0001, t + dur);
      o.connect(g).connect(this.gain); o.start(t); o.stop(t + dur + 0.05);
    });
  },
  playStep(s, t) {
    const f = this.MEL[s]; if (f) this.pluck(f, t);
    if (this.BASS[s]) this.pluck(this.BASS[s], t, 0.12);
    if (s === 0 || s === 8) this.drum(t, true);          // 大鼓
    if (s === 4 || s === 12) this.drum(t, false);        // 小鼓
    if (s === 15) this.drum(t + this.STEP_DUR / 2, false); // 过门
    if (s === 0) this.pad(t);                            // 箫垫底
  }
};

// ================= 简易补间引擎 =================
function tween(dur, onUpdate, onDone, ease) {
  tweens.push({ t: 0, dur, onUpdate, onDone, ease: ease || (k => 1 - Math.pow(1 - k, 3)) });
}
function updateTweens(dt) {
  for (let i = tweens.length - 1; i >= 0; i--) {
    const tw = tweens[i]; tw.t += dt;
    const k = Math.min(1, tw.t / tw.dur);
    tw.onUpdate(tw.ease(k));
    if (k >= 1) { tweens.splice(i, 1); tw.onDone && tw.onDone(); }
  }
}

// ================= 粒子爆发特效 =================
function burst(pos, colorHex, count, speed, life, size) {
  count = count || 40; speed = speed || 6; life = life || 0.85; size = size || 0.22;
  const geo = new THREE.BufferGeometry();
  const p = new Float32Array(count * 3), v = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    p[i*3] = pos.x; p[i*3+1] = pos.y; p[i*3+2] = pos.z;
    const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1), s = speed*(0.35+Math.random()*0.75);
    v[i*3] = Math.sin(ph)*Math.cos(th)*s; v[i*3+1] = Math.abs(Math.cos(ph))*s*1.15; v[i*3+2] = Math.sin(ph)*Math.sin(th)*s;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(p, 3));
  const mat = new THREE.PointsMaterial({ color: colorHex, size, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  bursts.push({ pts, v, age: 0, life });
}
function updateBursts(dt) {
  for (let i = bursts.length - 1; i >= 0; i--) {
    const b = bursts[i]; b.age += dt;
    const arr = b.pts.geometry.attributes.position.array;
    for (let j = 0; j < arr.length; j += 3) {
      arr[j] += b.v[j]*dt; arr[j+1] += b.v[j+1]*dt; arr[j+2] += b.v[j+2]*dt;
      b.v[j+1] -= 10*dt;
      if (arr[j+1] < 0.05) { arr[j+1] = 0.05; b.v[j+1] *= -0.35; b.v[j] *= 0.7; b.v[j+2] *= 0.7; }
    }
    b.pts.geometry.attributes.position.needsUpdate = true;
    b.pts.material.opacity = Math.max(0, 1 - b.age / b.life);
    if (b.age >= b.life) {
      scene.remove(b.pts); b.pts.geometry.dispose(); b.pts.material.dispose();
      bursts.splice(i, 1);
    }
  }
}

// ================= 进阶特效：碎甲/冲击波/闪光/火球/刀光 =================
const chunks = []; // 实体碎块（受重力、可弹跳）
function debris(pos, colorHex, count, speed) {
  for (let i = 0; i < count; i++) {
    const s = 0.07 + Math.random() * 0.13;
    const m = new THREE.Mesh(new THREE.TetrahedronGeometry(s),
      new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.65, emissive: colorHex, emissiveIntensity: 0.15 }));
    m.position.copy(pos); m.castShadow = true;
    scene.add(m);
    const th = Math.random() * Math.PI * 2, sp = speed * (0.3 + Math.random() * 0.7);
    chunks.push({ m, vx: Math.cos(th) * sp, vy: 2.5 + Math.random() * 3.5, vz: Math.sin(th) * sp,
      rx: (Math.random() - 0.5) * 12, ry: (Math.random() - 0.5) * 12, age: 0, life: 1.1 + Math.random() * 0.5 });
  }
}
function updateChunks(dt) {
  for (let i = chunks.length - 1; i >= 0; i--) {
    const c = chunks[i]; c.age += dt;
    c.vy -= 12 * dt;
    c.m.position.x += c.vx * dt; c.m.position.y += c.vy * dt; c.m.position.z += c.vz * dt;
    c.m.rotation.x += c.rx * dt; c.m.rotation.y += c.ry * dt;
    if (c.m.position.y < BOARD_TOP_Y + 0.06) {
      c.m.position.y = BOARD_TOP_Y + 0.06;
      c.vy *= -0.4; c.vx *= 0.6; c.vz *= 0.6;
    }
    const k = c.age / c.life;
    if (k > 0.6) c.m.scale.setScalar(Math.max(0.01, 1 - (k - 0.6) / 0.4));
    if (c.age >= c.life) {
      scene.remove(c.m); c.m.geometry.dispose(); c.m.material.dispose();
      chunks.splice(i, 1);
    }
  }
}
// 地面冲击波环
function shockRing(pos, colorHex, maxScale, dur) {
  const m = new THREE.Mesh(new THREE.RingGeometry(0.42, 0.62, 48),
    new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.95, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending }));
  m.rotation.x = -Math.PI / 2;
  m.position.set(pos.x, BOARD_TOP_Y + 0.05, pos.z);
  scene.add(m);
  tween(dur || 0.55, k => {
    m.scale.setScalar(1 + k * maxScale);
    m.material.opacity = 0.95 * (1 - k);
  }, () => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
}
// 瞬时点光闪光
function flashLight(pos, colorHex, intensity, dur) {
  const l = new THREE.PointLight(colorHex, intensity, 16, 2);
  l.position.copy(pos);
  scene.add(l);
  tween(dur || 0.3, k => { l.intensity = intensity * (1 - k); }, () => scene.remove(l));
}
// 膨胀火球
function fireball(pos, maxR, dur) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 12),
    new THREE.MeshBasicMaterial({ color: 0xffa93d, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false }));
  m.position.copy(pos);
  scene.add(m);
  tween(dur || 0.35, k => {
    m.scale.setScalar(0.3 + k * maxR);
    m.material.opacity = 0.95 * (1 - k * k);
  }, () => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
}
// 刀光弧（从攻击者方向劈向目标）
function slashArc(fromPos, toPos, colorHex) {
  const geo = new THREE.RingGeometry(0.7, 1.45, 40, 1, Math.PI * 0.15, Math.PI * 0.7);
  const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: colorHex || 0xfff3c8, transparent: true, opacity: 1, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending }));
  m.position.copy(toPos); m.position.y += 0.9;
  const dir = fromPos.clone().sub(toPos); dir.y = 0;
  m.rotation.y = Math.atan2(dir.x, dir.z);
  scene.add(m);
  tween(0.32, k => {
    m.scale.setScalar(0.6 + k * 1.3);
    m.rotation.z = -0.9 + k * 1.8;
    m.material.opacity = 1 - k;
  }, () => { scene.remove(m); geo.dispose(); m.material.dispose(); });
}

// ================= 场景初始化 =================
function getDefaultCameraPosition() {
  const portraitPhone = matchMedia('(max-width: 760px) and (orientation: portrait)').matches;
  return portraitPhone ? new THREE.Vector3(0, 34, 42) : new THREE.Vector3(0, 26, 31);
}

function initScene() {
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x8a5a40, 55, 150);
  clock = new THREE.Clock();

  camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 500);
  camera.position.copy(getDefaultCameraPosition());

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.92;
  document.getElementById('canvas-wrap').appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0.5, 0);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  controls.minDistance = 12; controls.maxDistance = 70;
  controls.maxPolarAngle = 1.38; controls.minPolarAngle = 0.18;
  controls.enablePan = false;

  // 灯光：夕阳平行光 + 半球环境光
  const sun = new THREE.DirectionalLight(0xffb070, 1.2);
  sun.position.set(-30, 30, 16);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left = -24; sun.shadow.camera.right = 24;
  sun.shadow.camera.top = 24; sun.shadow.camera.bottom = -24;
  sun.shadow.camera.far = 120; sun.shadow.bias = -0.0015;
  scene.add(sun);
  scene.add(new THREE.HemisphereLight(0x6a7aa8, 0x33281e, 0.4));
  const fill = new THREE.DirectionalLight(0x5a6a9a, 0.25);
  fill.position.set(24, 18, -26); scene.add(fill);

  // 程序化环境反射贴图（黄昏战场全景→PMREM；金盔/铜炮/铁剑金属质感关键，零外部资源）
  (function setupEnvMap() {
    const cv = document.createElement('canvas'); cv.width = 512; cv.height = 256;
    const ctx = cv.getContext('2d');
    // 等距柱状投影：天顶深蓝 → 地平橙红 → 地面暗褐
    const grd = ctx.createLinearGradient(0, 0, 0, 256);
    grd.addColorStop(0.0, '#24304f'); grd.addColorStop(0.4, '#4a2f42');
    grd.addColorStop(0.5, '#c96a2e'); grd.addColorStop(0.58, '#5a3a26');
    grd.addColorStop(1.0, '#241a12');
    ctx.fillStyle = grd; ctx.fillRect(0, 0, 512, 256);
    // 夕阳亮斑（方位对齐主光 sun(-30,30,16)：equirect 坐标约 (470,72)）
    const sunG = ctx.createRadialGradient(470, 72, 4, 470, 72, 95);
    sunG.addColorStop(0, 'rgba(255,224,160,0.95)'); sunG.addColorStop(0.3, 'rgba(255,160,80,0.5)');
    sunG.addColorStop(1, 'rgba(255,120,40,0)');
    ctx.fillStyle = sunG; ctx.fillRect(0, 0, 512, 256);
    // 地面营火暖光点缀（丰富低角度反射层次）
    for (let i = 0; i < 14; i++) {
      const fx = Math.random() * 512, fy = 150 + Math.random() * 70;
      const fg = ctx.createRadialGradient(fx, fy, 1, fx, fy, 16);
      fg.addColorStop(0, 'rgba(255,150,60,0.45)'); fg.addColorStop(1, 'rgba(255,120,40,0)');
      ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(fx, fy, 16, 0, 7); ctx.fill();
    }
    const envTex = new THREE.CanvasTexture(cv);
    envTex.mapping = THREE.EquirectangularReflectionMapping;
    envTex.encoding = THREE.sRGBEncoding;
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromEquirectangular(envTex).texture;
    pmrem.dispose(); envTex.dispose();
  })();

  // 天空穹顶（黄昏渐变）
  const skyGeo = new THREE.SphereGeometry(220, 24, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide, fog: false, depthWrite: false,
    uniforms: {},
    vertexShader: 'varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
    fragmentShader: `varying vec3 vP;
      void main(){
        float h = normalize(vP).y;
        vec3 top = vec3(0.07,0.09,0.19);
        vec3 mid = vec3(0.38,0.22,0.26);
        vec3 hor = vec3(0.88,0.46,0.22);
        vec3 c = h > 0.25 ? mix(mid, top, smoothstep(0.25,0.8,h)) : mix(hor, mid, smoothstep(-0.05,0.25,h));
        // 夕阳
        vec3 d = normalize(vP);
        float s = pow(max(dot(d, normalize(vec3(-0.55,0.18,0.35))),0.0), 60.0);
        c += vec3(1.0,0.7,0.35)*s*0.9;
        gl_FragColor = vec4(c,1.0);
      }`
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

// ================= 战场环境 =================
function buildEnvironment() {
  // 大地

    new THREE.CircleGeometry(160, 48),
    new THREE.MeshStandardMaterial({ color: 0x333d1e, roughness: 1 })
  );

    new THREE.CircleGeometry(19, 40),

  );
  dirt.rotation.x = -Math.PI/2; dirt.position.y = 0.02; dirt.receiveShadow = true;
  scene.add(dirt);

  // 环形远山（低多边形，带雪顶）——高度压低、距离拉近，使山脊线进入游戏视角
  const mountainMat = new THREE.MeshStandardMaterial({ color: 0x323a52, roughness: 1, flatShading: true });

  for (let i = 0; i < 28; i++) {
    const ang = (i / 28) * Math.PI * 2 + (Math.sin(i*7.3)*0.10);

    const h = 13 + Math.abs(Math.sin(i*5.7)) * 11;

    m.position.set(Math.cos(ang)*dist, h/2 - 1, Math.sin(ang)*dist);
    m.rotation.y = i * 1.7;
    scene.add(m);
    const snow = new THREE.Mesh(new THREE.ConeGeometry(r*0.36, h*0.32, 6), snowMat);
    snow.position.set(m.position.x, h*0.84 - 1, m.position.z);

  // 河流（前方一侧，波浪动画）

    color: 0x2e6f8e, transparent: true, opacity: 0.82, roughness: 0.25, metalness: 0.35
  }));
  waterMesh.rotation.x = -Math.PI/2;
  waterMesh.position.set(-52, 0.06, 30);
  scene.add(waterMesh);
  waterBase = waterGeo.attributes.position.array.slice();

  // 岸边石头
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x5a5f66, roughness: 1, flatShading: true });
  for (let i = 0; i < 22; i++) {
    const s = 0.5 + Math.random()*1.6;
    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(s, 0), rockMat);
    const ang = Math.random()*Math.PI*2, dist = 20 + Math.random()*46;
    rock.position.set(Math.cos(ang)*dist, s*0.4, Math.sin(ang)*dist);
    rock.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
    rock.castShadow = true; rock.receiveShadow = true;
    scene.add(rock);

// ================= 棋盘（双风格：木盘 / 战场地面） =================
function drawBoardCanvas(style) {
  const W = 1024, H = 1152, cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const cell = 112, mx = 56, my = 72; // 边距
  const px = c => mx + c * cell, py = r => my + r * cell;

  if (style === 'classic') {
    // 木纹底
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#c89a5e'); grad.addColorStop(0.5, '#d9ac6d'); grad.addColorStop(1, '#bd8f52');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 0.08;
    for (let i = 0; i < 60; i++) {
      ctx.strokeStyle = i % 2 ? '#7a5322' : '#f5d9a8'; ctx.lineWidth = 1 + Math.random()*2;
      ctx.beginPath();
      const y0 = Math.random()*H;
      ctx.moveTo(0, y0); ctx.bezierCurveTo(W*0.3, y0+20-Math.random()*40, W*0.7, y0+20-Math.random()*40, W, y0);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  } else {
    // 战场泥土地
    ctx.fillStyle = '#7d6a45'; ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < 900; i++) {
      const shade = ['#6b5a3a','#8d7a52','#75643f','#94835e','#5f5238'][i % 5];
      ctx.fillStyle = shade; ctx.globalAlpha = 0.25 + Math.random()*0.3;
      const s = 3 + Math.random()*14;
      ctx.beginPath(); ctx.arc(Math.random()*W, Math.random()*H, s, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // 车辙/裂纹
    ctx.strokeStyle = 'rgba(60,48,30,.35)'; ctx.lineWidth = 3;
    for (let i = 0; i < 26; i++) {
      ctx.beginPath();
      let x = Math.random()*W, y = Math.random()*H;
      ctx.moveTo(x, y);
      for (let j = 0; j < 4; j++) { x += (Math.random()-0.5)*90; y += (Math.random()-0.5)*90; ctx.lineTo(x, y); }
      ctx.stroke();
    }
  }

  // 楚河区域留白（真实流水由 3D 水面 mesh 呈现，贴图不再画静态水波）
  if (style === 'figure') {
    ctx.fillStyle = 'rgba(46,111,142,.25)';
    ctx.fillRect(px(0), py(4), cell*8, cell);
  }

  // 格线
  const lineColor = style === 'classic' ? '#4a2c10' : '#2e2a1e';
  ctx.strokeStyle = lineColor; ctx.lineWidth = 4; ctx.lineCap = 'square';
  for (let r = 0; r < ROWS; r++) { ctx.beginPath(); ctx.moveTo(px(0), py(r)); ctx.lineTo(px(8), py(r)); ctx.stroke(); }
  for (let c = 0; c < COLS; c++) {
    ctx.beginPath();
    if (c === 0 || c === 8) { ctx.moveTo(px(c), py(0)); ctx.lineTo(px(c), py(9)); }
    else { ctx.moveTo(px(c), py(0)); ctx.lineTo(px(c), py(4)); ctx.moveTo(px(c), py(5)); ctx.lineTo(px(c), py(9)); }
    ctx.stroke();
  }
  // 外框加粗
  ctx.lineWidth = 8; ctx.strokeRect(px(0), py(0), cell*8, cell*9);
  // 九宫斜线
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(px(3), py(0)); ctx.lineTo(px(5), py(2)); ctx.moveTo(px(5), py(0)); ctx.lineTo(px(3), py(2));
  ctx.moveTo(px(3), py(7)); ctx.lineTo(px(5), py(9)); ctx.moveTo(px(5), py(7)); ctx.lineTo(px(3), py(9));
  ctx.stroke();

  // 炮位/兵位小标记
  function mark(c, r) {
    const x = px(c), y = py(r), d = 12, g = 6;
    ctx.lineWidth = 3.5; ctx.strokeStyle = lineColor;
    [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([sx, sy]) => {
      if ((c === 0 && sx < 0) || (c === 8 && sx > 0)) return;
      ctx.beginPath();
      ctx.moveTo(x + sx*g, y + sy*(g+d)); ctx.lineTo(x + sx*g, y + sy*g); ctx.lineTo(x + sx*(g+d), y + sy*g);
      ctx.stroke();
    });
  }
  [[1,2],[7,2],[1,7],[7,7]].forEach(([c,r]) => mark(c,r));
  [0,2,4,6,8].forEach(c => { mark(c,3); mark(c,6); });

  // （楚河漢界文字已移至 3D 悬浮字，贴图不再绘制）
  return cv;
}

function canvasTex(size, draw, repeat) {

const armorTexCache = {};
function armorTexture(color) {
  if (!armorTexCache[color]) {
    const base = color === RED ? '#9c3125' : '#2b4662';
    const lite = color === RED ? '#c54a38' : '#40688c';
    const dark = color === RED ? '#59170f' : '#16222f';
    armorTexCache[color] = canvasTex(256, (ctx, S) => {
      ctx.fillStyle = dark; ctx.fillRect(0, 0, S, S);
      const rows = 6, cols = 5, sw = S / cols, sh = S / rows;
      for (let r = 0; r <= rows; r++) for (let c = -1; c <= cols; c++) {
        const off = (r % 2) ? sw / 2 : 0;
        const x = c * sw + off, y = r * sh, cx = x + sw / 2, w = sw * 0.46, h = sh * 0.92;
        const lg = ctx.createLinearGradient(0, y, 0, y + h);
        lg.addColorStop(0, lite); lg.addColorStop(0.65, base); lg.addColorStop(1, dark);
        ctx.fillStyle = lg;
        ctx.beginPath();
        ctx.moveTo(cx - w, y + 2);
        ctx.quadraticCurveTo(cx, y - 3, cx + w, y + 2);
        ctx.lineTo(cx + w, y + h * 0.55);
        ctx.quadraticCurveTo(cx + w, y + h, cx, y + h);
        ctx.quadraticCurveTo(cx - w, y + h, cx - w, y + h * 0.55);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#E8C25A';
        ctx.beginPath(); ctx.arc(cx, y + h * 0.3, 2.6, 0, 7); ctx.fill();
      }
    }, [3, 3]);
  }
  return armorTexCache[color];
}

      ctx.strokeStyle = 'rgba(255,255,255,.08)'; ctx.lineWidth = 2; // 织锦暗纹
      for (let i = -S; i < S * 2; i += 22) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + S, S); ctx.stroke();
      }
      ctx.strokeStyle = '#E8C25A'; ctx.lineWidth = 5; // 回纹边框
      const m = 16, u = 18;
      for (let x = m; x < S - m - u; x += u * 2) {
        ctx.strokeRect(x, m, u, u); ctx.strokeRect(x + u / 2, m + u / 2, u / 2, u / 2);
        ctx.strokeRect(x, S - m - u, u, u); ctx.strokeRect(x + u / 2, S - m - u / 2, u / 2, u / 2);
      }
      for (let y = m + u * 2; y < S - m - u * 2; y += u * 2) {
        ctx.strokeRect(m, y, u, u); ctx.strokeRect(S - m - u, y, u, u);
      }
      ctx.fillStyle = '#E8C25A'; // 中心团花
      for (let i = 0; i < 8; i++) {
        const a = i / 8 * Math.PI * 2;
        ctx.beginPath();
        ctx.ellipse(128 + Math.cos(a) * 34, 128 + Math.sin(a) * 34, 16, 8, a, 0, 7);
        ctx.fill();
      }
      ctx.beginPath(); ctx.arc(128, 128, 16, 0, 7); ctx.fill();

    const enemy = bd.flat().find(q => q && q.type === 'K' && q.color !== color);
    if (enemy && enemy.c === c) {

      for (let i = a; i < z; i++) if (bd[i][c]) { blocked = true; break; }

    [[1,1],[1,-1],[-1,1],[-1,-1]].forEach(([dr, dc]) => {
      const tr = r + dr, tc = c + dc;
      if (inPalace(tr, tc, color)) add(tr, tc);
    });
  } else if (type === 'B') {
    [[2,2],[2,-2],[-2,2],[-2,-2]].forEach(([dr, dc]) => {
      const tr = r + dr, tc = c + dc;
      if (!inBoard(tr, tc)) return;
      if (color === RED && tr < 5) return;   // 不能过河
      if (color === BLACK && tr > 4) return;
      if (bd[r + dr/2][c + dc/2]) return;    // 塞象眼

    .forEach(([dr, dc, lr, lc]) => {
      const tr = r + dr, tc = c + dc;
      if (!inBoard(tr, tc)) return;
      if (bd[r + lr][c + lc]) return;        // 蹩马腿
      add(tr, tc);

    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr, dc]) => {

  }

}

    if (p && p.type === 'K') (p.color === RED ? rk = { r, c } : bk = { r, c });

  }
  if (!king) return true;
  if (generalsFacing(bd)) return true;

  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const p = bd[r][c];

    const ok = !isInCheck(bd, p.color);
    p.r = or; p.c = oc;

  }

  }

function evaluate(bd, perspective) {

    let v = PIECE_VALUE[p.type];
    const tbl = PST[p.type];

    score += p.color === perspective ? v : -v;

    return m;
  }).sort((a, b) => b.score - a.score);

    const or = m.p.r, oc = m.p.c; m.p.r = m.tr; m.p.c = m.tc;

function placePieceMesh(p) {
  if (p.mesh) {
    // 清理该棋子的局部动画登记
    if (p.mesh.userData.anims) pieceAnims = pieceAnims.filter(r => p.mesh.userData.anims.indexOf(r) === -1);
    piecesGroup.remove(p.mesh);
    p.mesh.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
    });
  }
  const m = buildPieceMesh(p.type, p.color, pieceStyle);
  m.position.set(gx(p.c), BOARD_TOP_Y, gz(p.r));
  m.traverse(o => { o.userData.pieceId = p.id; });
  p.mesh = m;
  piecesGroup.add(m);
}
function rebuildAllPieces(animateIn) {
  pieces.forEach(p => { if (p.alive) placePieceMesh(p); });
  if (animateIn) {
    pieces.forEach((p, i) => {
      if (!p.alive) return;
      const targetY = p.mesh.position.y;
      p.mesh.position.y = targetY + 6;
      p.mesh.scale.setScalar(0.6);
      tween(0.55, k => {
        p.mesh.position.y = targetY + 6 * (1 - k);
        p.mesh.scale.setScalar(0.6 + 0.4 * k);
      }, null, k => 1 - Math.pow(1 - k, 3) * Math.abs(Math.sin(k * 2.2)));
      void i;
    });
  }
}

// 选中光圈 & 落点标记
function makeRing(inner, outer, colorHex, opacity) {
  const m = new THREE.Mesh(new THREE.RingGeometry(inner, outer, 40),
    new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: opacity || 0.85, side: THREE.DoubleSide, depthWrite: false }));
  m.rotation.x = -Math.PI/2;
  return m;
}
function showSelection(p, moves) {
  clearMarkers();
  selectRing = makeRing(0.7, 0.95, 0xF0C75E);
  selectRing.position.set(gx(p.c), BOARD_TOP_Y + 0.02, gz(p.r));
  selectRing.userData.isRing = true;
  markersGroup.add(selectRing);
  legalTargets = moves;
  moves.forEach(([tr, tc]) => {
    const isCap = boardState[tr][tc] && boardState[tr][tc].color !== p.color;
    const mk = isCap ? makeRing(0.55, 0.85, 0xff3b2f) : makeRing(0.18, 0.42, 0x7CFC9a);
    mk.position.set(gx(tc), BOARD_TOP_Y + 0.02, gz(tr));
    mk.userData.target = { r: tr, c: tc };
    markersGroup.add(mk);
  });
}
function clearMarkers() {
  while (markersGroup.children.length) {
    const m = markersGroup.children.pop();
    markersGroup.remove(m);
    m.geometry.dispose(); m.material.dispose();
  }
  selectRing = null; legalTargets = [];
}
// 取消选中（同时让悬浮棋子落回棋盘）
function clearSelection() {
  if (selected && selected.mesh) selected.mesh.position.y = BOARD_TOP_Y;
  selected = null;
  clearMarkers();
}

// ================= 走子动画与执行 =================
function squarePos(r, c) { return new THREE.Vector3(gx(c), BOARD_TOP_Y, gz(r)); }

function animateMovePiece(p, toR, toC, dur, onDone) {
  const from = p.mesh.position.clone();
  const to = squarePos(toR, toC);
  tween(dur, k => {
    p.mesh.position.lerpVectors(from, to, k);
    p.mesh.position.y = BOARD_TOP_Y + Math.sin(k * Math.PI) * 1.4;
  }, onDone);
}
// 吃子全屏特效：攻击方专属毛笔字 + 全屏闪光 + 墨迹飞溅
const BRUSH_WORDS = { K: '擒', A: '襲', B: '破', N: '踏', R: '斬', C: '轟', P: '殺' };
function brushStrikeFX(attacker) {
  if (!attacker) return;
  const overlay = document.getElementById('brush-overlay');
  const w = document.getElementById('brush-word');
  const col = attacker.color === RED ? '#e8332a' : '#27496e';
  w.textContent = BRUSH_WORDS[attacker.type] || '斬';
  w.style.color = col;
  // 墨迹点：围绕字随机 14 颗，颜色随攻击方
  overlay.querySelectorAll('.ink-dot').forEach(d => d.remove());
  for (let i = 0; i < 14; i++) {
    const d = document.createElement('div');
    d.className = 'ink-dot';
    const sz = 6 + Math.random() * 26;
    d.style.width = d.style.height = sz + 'px';
    d.style.color = col;
    d.style.left = (50 + (Math.random() - 0.5) * 46) + '%';
    d.style.top = (50 + (Math.random() - 0.5) * 42) + '%';
    d.style.setProperty('--dx', (Math.random() - 0.5) * 160 + 'px');
    d.style.setProperty('--dy', (Math.random() - 0.5) * 160 + 'px');
    overlay.appendChild(d);
  }
  w.classList.remove('on'); overlay.classList.remove('on');
  void w.offsetWidth; // 重启动画
  w.classList.add('on'); overlay.classList.add('on');
  const f = document.getElementById('screen-flash');
  f.classList.remove('on'); void f.offsetWidth; f.classList.add('on');
}

function animateCapture(victim, attacker, onDone, useSlash) {
  const pos = victim.mesh.position.clone(); pos.y += 0.9;
  const robeCol = victim.color === RED ? 0xC0392B : 0x3A5A7A;
  // 全屏毛笔字 + 闪光
  brushStrikeFX(attacker);
  // 刀光（仅近战）
  if (useSlash && attacker) slashArc(attacker.mesh.position, victim.mesh.position);
  // 火花三重爆
  burst(pos, 0xffe08a, 42, 7.5, 0.8, 0.2);
  burst(pos, robeCol, 36, 5.5, 0.9, 0.22);
  burst(pos, 0xffffff, 16, 9, 0.5, 0.14);
  // 碎甲横飞
  debris(pos, robeCol, 14, 3.2);
  debris(pos, GOLD, 8, 2.6);
  // 冲击波 + 闪光 + 震屏
  shockRing(victim.mesh.position, 0xffd27a, 4.2, 0.5);
  flashLight(pos, 0xffc46a, 2.6, 0.28);
  shakeT = 0.3; shakeAmp = 0.22;
  const s0 = victim.mesh.scale.x;
  tween(0.55, k => {
    victim.mesh.scale.setScalar(Math.max(0.01, s0 * (1 - k)));
    victim.mesh.rotation.y += 0.35;
    victim.mesh.position.y = BOARD_TOP_Y + Math.sin(k * Math.PI) * 0.5;
  }, () => {
    piecesGroup.remove(victim.mesh);
    onDone && onDone();
  });
}
function fireProjectile(cannon, toR, toC, onHit) {
  SFX.cannonFire();
  // 炮口世界坐标
  let from;
  if (cannon.mesh.userData.muzzle) from = cannon.mesh.localToWorld(cannon.mesh.userData.muzzle.clone());
  else from = cannon.mesh.position.clone().add(new THREE.Vector3(0, 0.8, 0));
  const to = squarePos(toR, toC); to.y += 0.6;
  // 炮口火光 + 硝烟 + 闪光
  burst(from, 0xffd27a, 24, 4, 0.4, 0.2);
  burst(from, 0xff7a22, 14, 3, 0.35, 0.26);
  burst(from, 0x999999, 12, 1.8, 0.9, 0.3);
  flashLight(from, 0xffa93d, 3, 0.22);
  // 炮身后坐（快速后坐缓慢复位，在炮弹落地前完成）
  const back = cannon.mesh.position.clone();
  const recoil = to.clone().sub(back); recoil.y = 0; recoil.normalize().multiplyScalar(0.32);
  tween(0.07, k => { cannon.mesh.position.copy(back).addScaledVector(recoil, -k); }, () => {
    tween(0.25, k2 => { cannon.mesh.position.copy(back).addScaledVector(recoil, -(1 - k2)); });
  });
  const ball = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 8),
    new THREE.MeshBasicMaterial({ color: 0xff6a22 }));
  const glow = new THREE.PointLight(0xff7722, 1.6, 8, 2);
  ball.add(glow);
  scene.add(ball);
  const dist = from.distanceTo(to);
  const apex = Math.max(from.y, to.y) + dist * 0.28 + 1;
  const dur = 0.32 + dist * 0.028;
  projectiles.push(ball);
  tween(dur, k => {
    ball.position.lerpVectors(from, to, k);
    ball.position.y = (1 - k) * (1 - k) * from.y + 2 * (1 - k) * k * apex + k * k * to.y;
    if (Math.random() < 0.6) burst(ball.position.clone(), 0xff9a3d, 3, 1.2, 0.3, 0.12);
  }, () => {
    scene.remove(ball);
    const idx = projectiles.indexOf(ball); if (idx >= 0) projectiles.splice(idx, 1);
    SFX.boom();
    shakeT = 0.55; shakeAmp = 0.42;
    const hitPos = to.clone();
    // 火球膨胀 + 烈焰浓烟 + 碎屑 + 双重冲击波
    fireball(hitPos, 2.4, 0.38);
    burst(hitPos, 0xff7a22, 70, 10, 1.0, 0.3);
    burst(hitPos, 0xffd27a, 46, 7, 0.8, 0.22);
    burst(hitPos, 0x777777, 36, 4, 1.4, 0.36);
    debris(hitPos, 0x4a3016, 12, 4);
    debris(hitPos, 0x8a8f96, 8, 3.4);
    shockRing(to, 0xffa93d, 5.5, 0.6);
    shockRing(to, 0xff5a22, 3.2, 0.8);
    flashLight(hitPos, 0xff8a2a, 4, 0.4);
    onHit && onHit();
  }, k => k);
}

// 执行一步棋（含动画、特效、音效），完成后回调
function performMove(p, toR, toC, done) {
  busy = true;
  clearMarkers();
  const victim = boardState[toR][toC];
  const fromR = p.r, fromC = p.c;
  // 更新数据
  boardState[fromR][fromC] = null;
  boardState[toR][toC] = p;
  p.r = toR; p.c = toC;
  if (victim) {
    victim.alive = false;
    if (p.color === RED) capturedByRed.push(victim); else capturedByBlack.push(victim);
  }
  moveHistory.push({ p, fromR, fromC, toR, toC, victim });
  updateCapturedUI();

  const finish = () => {
    busy = false;
    selected = null;
    done && done();
  };

  if (victim && p.type === 'C') {
    // 炮吃子：先开炮 → 爆炸 → 敌子消散 → 炮就位
    fireProjectile(p, toR, toC, () => {
      animateCapture(victim, p, () => {
        animateMovePiece(p, toR, toC, 0.45, () => { SFX.move(); finish(); });
      });
    });
  } else if (victim) {
    // 普通吃子：冲过去 → 敌子爆散
    animateMovePiece(p, toR, toC, 0.4, () => {
      SFX.capture();
      shakeT = 0.25; shakeAmp = 0.18;
      animateCapture(victim, p, finish, true);
    });
  } else {
    animateMovePiece(p, toR, toC, 0.42, () => { SFX.move(); finish(); });
  }
}

// 悔棋（数据 + 动画）
function undoMove(silent) {
  const h = moveHistory.pop();
  if (!h) return false;
  gameSeq++; // 使进行中的AI延时失效
  const { p, fromR, fromC, toR, toC, victim } = h;
  boardState[toR][toC] = null;
  boardState[fromR][fromC] = p;
  p.r = fromR; p.c = fromC;
  if (victim) {
    victim.alive = true;
    boardState[toR][toC] = victim;
    if (!victim.mesh.parent) piecesGroup.add(victim.mesh);
    victim.mesh.scale.setScalar(1);
    victim.mesh.position.copy(squarePos(toR, toC));
    const arr = p.color === RED ? capturedByRed : capturedByBlack;
    const idx = arr.indexOf(victim); if (idx >= 0) arr.splice(idx, 1);
  }
  p.mesh.position.copy(squarePos(fromR, fromC));
  turn = p.color;
  gameOver = false;
  document.getElementById('win-banner').classList.remove('show');
  updateCapturedUI();
  updateTurnUI();
  if (!silent) SFX.move();
  return true;
}

// ================= 游戏流程控制 =================
function postMove() {
  updateTurnUI();
  const enemy = turn === RED ? BLACK : RED;
  const inCheck = isInCheck(boardState, enemy);
  const hasMove = hasAnyLegalMove(boardState, enemy);
  turn = enemy;
  updateTurnUI();

  if (!hasMove) {
    gameOver = true;
    const winner = enemy === RED ? BLACK : RED;
    const winText = winner === RED ? '红方胜利！' : '黑方胜利！';
    document.getElementById('win-text').textContent = winText;
    document.getElementById('win-text').style.color = winner === RED ? '#ff9a8a' : '#a8c4e0';
    document.getElementById('win-sub').textContent = inCheck ? '绝杀无解，将死对方老帅！' : '困毙！对方无棋可走！';
    document.getElementById('win-banner').classList.add('show');
    const humanWin = gameMode === 'pvp' || winner === RED;
    if (humanWin) SFX.win(); else SFX.lose();
    setStatus(inCheck ? '将军绝杀！' + winText : '困毙对方！' + winText);
    updateTurnUI('🏆 ' + winText);
    return;
  }
  if (inCheck) {
    showToast('将军！', true);
    SFX.check();
    setStatus((turn === RED ? '红方' : '黑方') + '被将军，快解围！');
  } else {
    setStatus(turn === RED ? '红方走棋' : (gameMode === 'pvp' ? '黑方走棋' : '电脑思考中…'));
  }
  maybeAIMove();
}
function maybeAIMove() {
  if (gameOver || gameMode === 'pvp' || turn !== BLACK) return;
  busy = true;
  updateTurnUI('黑方（电脑）思考中…');
  const seq = gameSeq;
  setTimeout(() => {
    if (seq !== gameSeq || gameOver) { busy = false; return; } // 已重开/悔棋，放弃本次
    const depth = AI_DEPTH[gameMode] || 3;
    const mv = aiPickMove(BLACK, depth);
    if (!mv || seq !== gameSeq || gameOver) { busy = false; return; }
    busy = false;
    performMove(mv.p, mv.tr, mv.tc, postMove);
  }, 500);
}
function trySelectAt(r, c) {
  const p = boardState[r][c];
  if (!p) return false;
  if (p.color !== turn) { SFX.illegal(); showToast('现在轮到' + (turn === RED ? '红方' : '黑方') + '走棋', false); return false; }
  if (gameMode !== 'pvp' && turn === BLACK) return false; // 电脑的棋子不能选
  if (selected && selected.mesh && selected !== p) selected.mesh.position.y = BOARD_TOP_Y;
  selected = p;
  SFX.select();
  const moves = legalMoves(boardState, p);
  showSelection(p, moves);
  const name = CH_NAME[p.color][p.type];
  setStatus('选中了「' + name + '」，有 ' + moves.length + ' 个位置可以走。');
  return true;
}
function tryMoveSelected(toR, toC) {
  if (!selected) return false;
  const ok = legalTargets.some(([r, c]) => r === toR && c === toC);
  if (!ok) { SFX.illegal(); return false; }
  const p = selected;
  performMove(p, toR, toC, postMove);
  return true;
}

// ================= 输入拾取 =================
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let downPos = null;
function setupInput() {
  const el = renderer.domElement;
  el.addEventListener('pointerdown', e => { downPos = { x: e.clientX, y: e.clientY }; });
  el.addEventListener('pointerup', e => {
    if (!downPos) return;
    const dx = e.clientX - downPos.x, dy = e.clientY - downPos.y;
    downPos = null;
    if (dx * dx + dy * dy > 36) return; // 视为拖拽视角
    handlePick(e);
  });
}
function handlePick(e) {
  if (busy || gameOver) return;
  if (gameMode !== 'pvp' && turn === BLACK) return;
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);

  // 先检测落点标记
  const mkHit = raycaster.intersectObjects(markersGroup.children, false);
  for (const h of mkHit) {
    if (h.object.userData.target) {
      const { r, c } = h.object.userData.target;
      tryMoveSelected(r, c);
      return;
    }
  }
  // 再检测棋子
  const pcHit = raycaster.intersectObjects(piecesGroup.children, true);
  for (const h of pcHit) {
    let o = h.object;
    while (o && o.userData.pieceId === undefined) o = o.parent;
    if (!o) continue;
    const p = pieces.find(q => q.id === o.userData.pieceId && q.alive);
    if (!p) continue;
    if (selected && p.color !== turn) {
      // 点击对方棋子 = 尝试吃子
      if (tryMoveSelected(p.r, p.c)) return;
    }
    if (p.color === turn) { trySelectAt(p.r, p.c); return; }
    // 点到了不可吃的对方棋子
    if (selected) { SFX.illegal(); showToast('这个位置走不了哦', false); }
    return;
  }
  // 点到棋盘空格
  const topHit = raycaster.intersectObject(boardMeshes.top, false);
  if (topHit.length && selected) {
    const pt = topHit[0].point;
    const c = Math.round(pt.x / CELL + 4), r = Math.round(pt.z / CELL + 4.5);
    if (inBoard(r, c)) {
      if (!tryMoveSelected(r, c)) { clearSelection(); setStatus('已取消选择。'); }
    }
    return;
  }
  if (selected) { clearSelection(); setStatus('已取消选择。'); }
}

// ================= UI / HUD =================
function setStatus(t) { document.getElementById('status-line').textContent = t; }
let toastTimer = null;
function showToast(text, danger) {
  const el = document.getElementById('toast');
  el.textContent = text;
  el.classList.toggle('danger', !!danger);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
}
function updateTurnUI(customText) {
  const badge = document.getElementById('turn-badge');
  if (customText) badge.textContent = customText;
  else badge.textContent = turn === RED ? '红方走棋' : (gameMode === 'pvp' ? '黑方走棋' : '黑方（电脑）');
  badge.classList.toggle('black', turn === BLACK);
}
function updateCapturedUI() {
  const names = arr => arr.length ? arr.map(p => CH_NAME[p.color][p.type]).join(' ') : '无';
  document.getElementById('cap-red').textContent = names(capturedByBlack);  // 红方损失 = 被黑方吃的
  document.getElementById('cap-black').textContent = names(capturedByRed);
}
function restartGame() {
  gameSeq++;
  // 清空旧棋子
  pieces.forEach(p => {
    if (!p.mesh) return;
    piecesGroup.remove(p.mesh);
    p.mesh.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => { if (m.map) m.map.dispose(); m.dispose(); });
    });
  });
  pieces = [];
  moveHistory = [];
  capturedByRed = []; capturedByBlack = [];
  selected = null; clearMarkers();
  gameOver = false; busy = false;
  turn = RED;
  boardState = initBoardState();
  rebuildAllPieces(true);
  document.getElementById('win-banner').classList.remove('show');
  updateCapturedUI();
  updateTurnUI();
  setStatus('新对局开始！红方先行。点击棋子查看走法。');
  showToast('开战！', false);
  maybeAIMove();
}
function switchPieceStyle(style) {
  pieceStyle = style;
  applyBoardStyle();
  pieces.forEach(p => { if (p.alive) placePieceMesh(p); });
  if (selected) { const moves = legalMoves(boardState, selected); showSelection(selected, moves); }
  showToast(style === 'figure' ? '形象模式' : '传统圆棋', false);
}

// ================= 主循环 =================
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  camera.position.sub(shakeOff); shakeOff.set(0, 0, 0); // 撤销上帧震屏偏移
  controls.update();
  updateTweens(dt);
  updateBursts(dt);

  // 旗帜飘动
  for (const f of flagCloths) {
    const arr = f.mesh.geometry.attributes.position.array;
    for (let i = 0; i < arr.length; i += 3) {
      const x0 = f.base[i];
      arr[i + 2] = Math.sin(x0 * 1.6 + t * 3.2 + f.seed) * 0.18 * (x0 / 3.4)
                 + Math.sin(x0 * 3.1 + t * 5.1 + f.seed) * 0.07 * (x0 / 3.4);
    }
    f.mesh.geometry.attributes.position.needsUpdate = true;
  }
  // 火把闪烁
  for (const tc of torchLights) {
    const n = Math.sin(t * 11 + tc.seed * 7) * 0.5 + Math.sin(t * 23 + tc.seed * 3) * 0.5;
    tc.light.intensity = 1.05 + n * 0.35;
    tc.flame.scale.set(1 + n * 0.12, 1 + n * 0.22, 1 + n * 0.12);
  }
  // 棋子局部动画（盔缨/令旗/马尾/象鼻/象耳/马头）
  for (const a of pieceAnims) {
    if (a.kind === 'sway') a.obj.rotation.z = a.baseZ + Math.sin(t * 2.2 + a.seed) * 0.16;
    else if (a.kind === 'flutter') a.obj.rotation.y = a.baseY + Math.sin(t * 3.4 + a.seed) * 0.26;
    else if (a.kind === 'trunk') a.obj.rotation.x = a.baseX + Math.sin(t * 1.4 + a.seed) * 0.13;
    else if (a.kind === 'ear') a.obj.rotation.z = a.baseZ + Math.sin(t * 1.8 + a.seed) * 0.22;
    else if (a.kind === 'nod') a.obj.rotation.x = a.baseX + Math.sin(t * 0.9 + a.seed) * 0.1;
  }
  // 形象棋子待机动作（呼吸起伏 + 微摇晃，相位随机）
  if (pieceStyle === 'figure') {
    for (const p of pieces) {
      if (!p.alive || !p.mesh) continue;
      const fig = p.mesh.userData.fig;
      if (!fig) continue;
      const ph = p.mesh.userData.idlePhase;
      fig.position.y = 0.16 + Math.sin(t * 1.7 + ph) * 0.028;
      fig.rotation.z = Math.sin(t * 0.8 + ph) * 0.02;
    }
  }
  // 水面波浪
  if (waterMesh) {
    const arr = waterMesh.geometry.attributes.position.array;
    for (let i = 0; i < arr.length; i += 3) {
      const x = waterBase[i], y = waterBase[i + 1];
      arr[i + 2] = Math.sin(x * 0.35 + t * 1.4) * 0.22 + Math.cos(y * 0.42 + t * 1.1) * 0.18;
    }
    waterMesh.geometry.attributes.position.needsUpdate = true;
    waterMesh.geometry.computeVertexNormals();
  }
  // 楚河流水 + 悬浮字微波浮沉
  if (boardMeshes.riverUniforms) boardMeshes.riverUniforms.uTime.value = t;
  if (boardMeshes.riverWords) {
    for (const w of boardMeshes.riverWords) {
      w.position.y = w.userData.baseY + Math.sin(t * 1.6 + w.userData.ph) * 0.012;
    }
  }
  // 选中棋子呼吸浮动
  if (selected && selected.mesh && !busy) {
    selected.mesh.position.y = BOARD_TOP_Y + 0.35 + Math.sin(t * 4) * 0.08;
  }
  // 选中光圈旋转
  if (selectRing) selectRing.rotation.z += dt * 1.5;
  // 震屏（本帧加偏移，下帧撤销，避免相机漂移）
  if (shakeT > 0) {
    shakeT -= dt;
    const a = shakeAmp * (shakeT / 0.45);
    shakeOff.set((Math.random() - 0.5) * a, (Math.random() - 0.5) * a, (Math.random() - 0.5) * a * 0.4);
    camera.position.add(shakeOff);
  }

  renderer.render(scene, camera);
}

// ================= 启动 & 事件绑定 =================
function bindUI() {
  // 开场选择
  function optGroup(id, cb) {
    const box = document.getElementById(id);
    box.addEventListener('click', e => {
      const opt = e.target.closest('.intro-opt');
      if (!opt) return;
      box.querySelectorAll('.intro-opt').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      cb(opt.dataset.v);
    });
  }
  optGroup('intro-mode', v => gameMode = v);
  optGroup('intro-style', v => pieceStyle = v);

  document.getElementById('intro-start').addEventListener('click', () => {
    SFX.init();
    if (BGM.on) BGM.start();
    document.getElementById('intro').classList.add('hide');
    document.getElementById('btn-style-classic').classList.toggle('active', pieceStyle === 'classic');
    document.getElementById('btn-style-figure').classList.toggle('active', pieceStyle === 'figure');
    applyBoardStyle();
    restartGame();
  });

  document.getElementById('btn-restart').addEventListener('click', restartGame);
  document.getElementById('win-again').addEventListener('click', restartGame);
  document.getElementById('btn-undo').addEventListener('click', () => {
    if (busy || moveHistory.length === 0) { if (moveHistory.length === 0) showToast('还没有走过棋', false); return; }
    clearSelection();
    undoMove(true);
    // 人机模式下连悔两步，回到玩家回合
    if (gameMode !== 'pvp' && turn === BLACK && moveHistory.length > 0) undoMove(true);
    SFX.move();
    setStatus('已悔棋，轮到' + (turn === RED ? '红方' : '黑方') + '。');
    updateTurnUI();
  });
  document.getElementById('btn-hint').addEventListener('click', () => {
    if (busy || gameOver) return;
    if (gameMode !== 'pvp' && turn === BLACK) return;
    setStatus('正在帮你想想…');
    setTimeout(() => {
      const mv = aiPickMove(turn, 2);
      if (!mv) return;
      const fromRing = makeRing(0.7, 0.95, 0x4db8ff);
      fromRing.position.set(gx(mv.fc), BOARD_TOP_Y + 0.025, gz(mv.fr));
      markersGroup.add(fromRing);
      const toRing = makeRing(0.55, 0.85, 0x4db8ff);
      toRing.position.set(gx(mv.tc), BOARD_TOP_Y + 0.025, gz(mv.tr));
      markersGroup.add(toRing);
      setStatus('提示：把「' + CH_NAME[mv.p.color][mv.p.type] + '」走到蓝色光圈处。');
      setTimeout(() => {
        [fromRing, toRing].forEach(m => {
          const i = markersGroup.children.indexOf(m);
          if (i >= 0) { markersGroup.remove(m); m.geometry.dispose(); m.material.dispose(); }
        });
      }, 2600);
    }, 60);
  });
  document.getElementById('btn-camera').addEventListener('click', () => {
    const p0 = camera.position.clone(), t0 = controls.target.clone();
    const p1 = getDefaultCameraPosition(), t1 = new THREE.Vector3(0, 0.5, 0);
    tween(0.8, k => {
      camera.position.lerpVectors(p0, p1, k);
      controls.target.lerpVectors(t0, t1, k);
    });
  });
  document.getElementById('btn-sound').addEventListener('click', function() {
    const on = SFX.toggle();
    this.textContent = on ? '🔊 音效：开' : '🔇 音效：关';
  });
  document.getElementById('btn-bgm').addEventListener('click', function() {
    BGM.on = !BGM.on;
    if (BGM.on) { SFX.init(); BGM.start(); } else { BGM.stop(); }
    this.textContent = BGM.on ? '🎵 背景音乐：开' : '🎵 背景音乐：关';
  });
  document.getElementById('btn-style-classic').addEventListener('click', () => {
    if (pieceStyle === 'classic') return;
    switchPieceStyle('classic');
    document.getElementById('btn-style-classic').classList.add('active');
    document.getElementById('btn-style-figure').classList.remove('active');
  });
  document.getElementById('btn-style-figure').addEventListener('click', () => {
    if (pieceStyle === 'figure') return;
    switchPieceStyle('figure');
    document.getElementById('btn-style-figure').classList.add('active');
    document.getElementById('btn-style-classic').classList.remove('active');
  });
  // 面板折叠
  const panel = document.getElementById('panel'), toggleBtn = document.getElementById('panel-toggle');
  if (matchMedia('(max-width: 760px)').matches) {
    panel.classList.add('collapsed');
    toggleBtn.classList.remove('moved');
  }
  toggleBtn.addEventListener('click', () => {
    panel.classList.toggle('collapsed');
    toggleBtn.classList.toggle('moved', !panel.classList.contains('collapsed'));
  });
}

function boot() {
  initScene();
  buildEnvironment();
  buildBoard();
  scene.add(piecesGroup);
  scene.add(markersGroup);
  boardState = initBoardState();
  rebuildAllPieces(false); // 先按默认模式摆好（开场动画后可重启）
  setupInput();
  bindUI();
  updateTurnUI();
  animate();
}
boot();

// ================= 调试 / 自动化测试接口 =================
window.XQ = {
  state: () => ({ turn, gameOver, busy, mode: gameMode, style: pieceStyle,
    pieces: pieces.filter(p => p.alive).length, history: moveHistory.length }),
  board: () => boardState.map(row => row.map(p => p ? p.color + p.type : '..')),
  select: trySelectAt,
  move: tryMoveSelected,
  legal: (r, c) => boardState[r] && boardState[r][c] ? legalMoves(boardState, boardState[r][c]) : null,
  restart: restartGame,
  setMode: v => { gameMode = v; },
  setStyle: switchPieceStyle,
  undo: () => document.getElementById('btn-undo').click(),
  start: () => document.getElementById('intro-start').click(),
  inCheck: c => isInCheck(boardState, c),
  hasMove: c => hasAnyLegalMove(boardState, c),
  setCam: (x, y, z, tx, ty, tz) => { camera.position.set(x, y, z); controls.target.set(tx, ty, tz); }
};
</script>
